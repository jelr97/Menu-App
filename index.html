<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Menu App</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <style>
    /* =====================================================================
       Menu App — "Liquid Glass" theme
       Core techniques:
         - Ambient gradient body so glass surfaces have something to refract
         - backdrop-filter: blur() + saturate() for translucent frosted panels
         - Inset highlight on the top edge (specular) + soft outer shadow (depth)
         - Thin hairline borders using rgba(255,255,255,.*) for edge catchlight
         - Generous rounded corners on the Apple iOS 17+ scale
       -===================================================================== */

    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display",
        system-ui, "Segoe UI", Roboto, sans-serif;
      color: #1c1c1e;
      min-height: 100vh; display: flex; flex-direction: column;
      -webkit-font-smoothing: antialiased;
      /* Ambient pastel wash behind all glass surfaces */
      background:
        radial-gradient(1200px 800px at 8% -10%, rgba(191, 219, 254, 0.55), transparent 55%),
        radial-gradient(1000px 700px at 95% 20%, rgba(252, 231, 243, 0.55), transparent 60%),
        radial-gradient(900px 800px at 50% 110%, rgba(221, 214, 254, 0.5), transparent 60%),
        radial-gradient(700px 500px at 80% 70%, rgba(253, 230, 138, 0.25), transparent 65%),
        #f2f2f7;
      background-attachment: fixed;
    }

    /* ===== TOP BAR ===== */
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.68);
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      border-bottom: 0.5px solid rgba(0, 0, 0, 0.06);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6);
      position: sticky; top: 0; z-index: 100;
    }
    .top-bar h1 {
      font-size: 18px; font-weight: 700;
      background: linear-gradient(180deg, #1c1c1e, #3c3c43);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .top-bar-actions { display: flex; gap: 8px; align-items: center; }
    .settings-btn {
      background: none; border: none; font-size: 20px; cursor: pointer; color: #3c3c43;
      padding: 4px;
    }

    /* ===== TAB CONTENT ===== */
    .tab-content {
      flex: 1; overflow-y: auto; padding: 16px;
      /* Room for the floating tab-bar pill + its bottom margin + safe-area. */
      padding-bottom: calc(110px + env(safe-area-inset-bottom, 0));
      display: none;
    }
    .tab-content.active { display: block; }

    /* ===== BOTTOM TAB BAR =====
       Floating pill: sits above the bottom edge, auto-widths to its contents,
       heavily blurred so content scrolls under it. Active tab gets its own
       inner glass "lens" capsule, matching the iOS 26 App Store pattern.

       Uses ::before for a chromatic gradient border (approximating the
       refractive rainbow catchlight Apple renders with Metal shaders). */
    .tab-bar {
      display: flex;
      position: fixed;
      bottom: calc(16px + env(safe-area-inset-bottom, 0));
      left: 16px;
      right: 16px;
      padding: 6px;
      gap: 4px;
      border-radius: 999px;
      /* Slightly more opaque so the boundary reads cleanly against a light
         pastel background. On a darker background the blur would carry more
         contrast naturally. */
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(40px) saturate(200%);
      -webkit-backdrop-filter: blur(40px) saturate(200%);
      border: 0.5px solid rgba(255, 255, 255, 0.7);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.95),
        inset 0 -1px 0 rgba(0, 0, 0, 0.04),
        /* Floating: tighter contact shadow + a softer wide ambient shadow. */
        0 1px 2px rgba(0, 0, 0, 0.06),
        0 8px 20px rgba(0, 0, 0, 0.08),
        0 18px 44px rgba(0, 0, 0, 0.08);
      z-index: 100;
    }
    .tab-bar::before {
      /* Chromatic gradient border using the mask-composite trick. Simulates
         Apple's refractive rainbow catchlight on the pill's perimeter. */
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg,
        rgba(255, 190, 210, 0.55),
        rgba(200, 220, 255, 0.45),
        rgba(220, 200, 255, 0.55),
        rgba(255, 225, 180, 0.45));
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
              mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      pointer-events: none;
    }
    .tab-bar button {
      position: relative;
      /* Equal distribution so the pill spans the viewport and tabs space out
         evenly — matches the iOS tab bar convention. */
      flex: 1 1 0;
      min-width: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 8px 12px;
      border: 0.5px solid transparent;
      background: transparent;
      font-size: 11px; font-weight: 500;
      color: #3c3c43; cursor: pointer;
      gap: 2px;
      border-radius: 999px;
      transition: color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }
    .tab-bar button .tab-icon { font-size: 22px; }
    .tab-bar button.active {
      color: #2563eb;
      /* Bright white lens so the active state clearly pops inside the pill. */
      background: rgba(255, 255, 255, 0.92);
      border-color: rgba(255, 255, 255, 0.85);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 1),
        inset 0 -1px 0 rgba(0, 0, 0, 0.04),
        0 0 0 0.5px rgba(0, 0, 0, 0.02),
        0 3px 10px rgba(0, 0, 0, 0.08),
        0 1px 2px rgba(0, 0, 0, 0.04);
    }

    /* ===== MODAL OVERLAY ===== */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(10px) saturate(140%);
      -webkit-backdrop-filter: blur(10px) saturate(140%);
      z-index: 200; align-items: center; justify-content: center; padding: 16px;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(40px) saturate(200%);
      -webkit-backdrop-filter: blur(40px) saturate(200%);
      border: 0.5px solid rgba(255, 255, 255, 0.5);
      border-radius: 22px;
      padding: 24px;
      width: 100%; max-width: 400px; max-height: 90vh; overflow-y: auto;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.8),
        inset 0 -1px 0 rgba(0, 0, 0, 0.04),
        0 24px 48px rgba(0, 0, 0, 0.14),
        0 2px 6px rgba(0, 0, 0, 0.05);
    }
    .modal h2 { font-size: 19px; margin-bottom: 16px; font-weight: 700; letter-spacing: -0.2px; }
    .modal-actions { display: flex; gap: 8px; margin-top: 16px; }

    /* ===== BUTTONS =====
       Glass buttons with a gradient fill + inset top highlight + tinted glow. */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 11px 18px; border-radius: 14px; font-size: 14px;
      font-weight: 600; cursor: pointer; border: none;
      letter-spacing: -0.1px;
      transition: transform 0.08s ease, box-shadow 0.15s ease;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: linear-gradient(180deg, #3b82f6, #2563eb);
      color: #fff;
      border: 0.5px solid rgba(255, 255, 255, 0.2);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.3),
        inset 0 -1px 0 rgba(0, 0, 0, 0.08),
        0 6px 16px rgba(37, 99, 235, 0.28),
        0 1px 2px rgba(37, 99, 235, 0.12);
    }
    .btn-primary:active {
      background: linear-gradient(180deg, #2563eb, #1d4ed8);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.2),
        inset 0 -1px 0 rgba(0, 0, 0, 0.12),
        0 2px 8px rgba(37, 99, 235, 0.25);
    }
    .btn-secondary {
      background: rgba(255, 255, 255, 0.65);
      color: #1c1c1e;
      border: 0.5px solid rgba(0, 0, 0, 0.06);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.8),
        0 1px 3px rgba(0, 0, 0, 0.04),
        0 4px 12px rgba(0, 0, 0, 0.04);
    }
    .btn-secondary:active { background: rgba(255, 255, 255, 0.85); }
    .btn-danger {
      background: linear-gradient(180deg, rgba(254, 226, 226, 0.9), rgba(254, 202, 202, 0.9));
      color: #dc2626;
      border: 0.5px solid rgba(220, 38, 38, 0.15);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.6),
        0 4px 12px rgba(220, 38, 38, 0.12);
    }
    .btn-danger:active {
      background: linear-gradient(180deg, rgba(254, 202, 202, 0.95), rgba(252, 165, 165, 0.95));
    }
    .btn-full { width: 100%; }
    .btn-sm { padding: 7px 14px; font-size: 13px; border-radius: 10px; }

    /* ===== FORM ELEMENTS ===== */
    input[type="text"], input[type="number"], input[type="password"], select, textarea {
      width: 100%; padding: 12px 14px;
      border: 0.5px solid rgba(0, 0, 0, 0.08);
      border-radius: 12px;
      font-size: 15px; font-family: inherit; color: #1c1c1e;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.55), inset 0 0 0 rgba(37, 99, 235, 0);
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: rgba(37, 99, 235, 0.5);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.55),
        0 0 0 4px rgba(37, 99, 235, 0.12);
    }
    textarea { resize: vertical; min-height: 60px; }

    /* ===== CARDS ===== */
    .card {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(18px) saturate(170%);
      -webkit-backdrop-filter: blur(18px) saturate(170%);
      border-radius: 16px;
      padding: 16px;
      border: 0.5px solid rgba(255, 255, 255, 0.45);
      margin-bottom: 10px; cursor: pointer;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.7),
        inset 0 -1px 0 rgba(0, 0, 0, 0.03),
        0 2px 8px rgba(0, 0, 0, 0.04),
        0 8px 24px rgba(0, 0, 0, 0.04);
      transition: transform 0.12s ease, box-shadow 0.15s ease;
    }
    .card:active {
      transform: scale(0.985);
      background: rgba(255, 255, 255, 0.75);
    }
    .card-title { font-weight: 600; font-size: 15px; margin-bottom: 4px; letter-spacing: -0.1px; }
    .card-meta { font-size: 12px; color: #8e8e93; }

    /* ===== CHIPS ===== */
    .chip-row { display: flex; gap: 8px; overflow-x: auto; padding: 8px 0; }
    .chip-row::-webkit-scrollbar { display: none; }
    .chip-row { scrollbar-width: none; }
    .chip {
      padding: 7px 16px;
      border-radius: 999px;
      font-size: 13px; font-weight: 600;
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(12px) saturate(160%);
      -webkit-backdrop-filter: blur(12px) saturate(160%);
      color: #3c3c43;
      border: 0.5px solid rgba(0, 0, 0, 0.06);
      cursor: pointer; white-space: nowrap;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.65), 0 1px 2px rgba(0, 0, 0, 0.03);
      transition: transform 0.08s ease;
    }
    .chip:active { transform: scale(0.95); }
    .chip.active {
      background: linear-gradient(180deg, #3b82f6, #2563eb);
      color: #fff;
      border-color: rgba(37, 99, 235, 0.4);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.3),
        0 4px 12px rgba(37, 99, 235, 0.28);
    }

    /* ===== CHECKLIST ===== */
    .check-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 0;
      border-bottom: 0.5px solid rgba(0, 0, 0, 0.06);
    }
    .check-item input[type="checkbox"] {
      width: 22px; height: 22px; accent-color: #2563eb; cursor: pointer;
    }
    .check-item.checked .check-label { text-decoration: line-through; color: #aeaeb2; }
    .check-label { flex: 1; font-size: 14px; }
    .check-amount { font-size: 13px; color: #8e8e93; }

    /* ===== FAB ===== */
    .fab {
      position: fixed;
      bottom: calc(120px + env(safe-area-inset-bottom, 0));
      right: 16px; width: 56px; height: 56px;
      border-radius: 50%;
      background: linear-gradient(180deg, #3b82f6, #2563eb);
      color: #fff; border: 0.5px solid rgba(255, 255, 255, 0.25);
      font-size: 30px; font-weight: 300; line-height: 1; cursor: pointer;
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.3),
        inset 0 -1px 0 rgba(0, 0, 0, 0.12),
        0 10px 28px rgba(37, 99, 235, 0.38),
        0 2px 6px rgba(37, 99, 235, 0.2);
      display: flex; align-items: center; justify-content: center; z-index: 50;
      transition: transform 0.1s ease;
    }
    .fab:active {
      transform: scale(0.93);
      background: linear-gradient(180deg, #2563eb, #1d4ed8);
    }

    /* ===== MEAL PLAN ===== */
    .week-row {
      display: flex; flex-direction: column; gap: 10px; padding: 8px 0;
    }
    .day-col {
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(20px) saturate(170%);
      -webkit-backdrop-filter: blur(20px) saturate(170%);
      border-radius: 18px;
      border: 0.5px solid rgba(255, 255, 255, 0.45);
      padding: 14px;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.7),
        0 2px 10px rgba(0, 0, 0, 0.03),
        0 10px 24px rgba(0, 0, 0, 0.04);
    }
    .day-col.today {
      border-color: rgba(37, 99, 235, 0.35);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.7),
        0 0 0 1px rgba(37, 99, 235, 0.1),
        0 10px 28px rgba(37, 99, 235, 0.12);
    }
    .day-header {
      font-size: 14px; font-weight: 700;
      margin-bottom: 10px; color: #3c3c43;
      display: flex; align-items: center; gap: 8px; letter-spacing: -0.1px;
    }
    .day-header.today { color: #2563eb; }
    .day-date { font-size: 12px; color: #8e8e93; font-weight: 500; }
    .meal-chips { display: flex; flex-direction: column; gap: 6px; }
    .meal-chip {
      /* No backdrop-filter here: this chip lives inside .day-col which is
         already a blurred surface. Nesting blurs hurts performance without
         adding visible glassiness. */
      font-size: 13px; padding: 7px 8px;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 12px;
      border: 0.5px solid rgba(255, 255, 255, 0.5);
      position: relative; display: flex; align-items: center; gap: 6px;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.7),
        0 1px 3px rgba(0, 0, 0, 0.03);
    }
    .meal-chip-body {
      flex: 1; display: flex; align-items: center; gap: 8px;
      min-width: 0; cursor: pointer;
    }
    .meal-chip .slot-label { font-weight: 700; font-size: 10px; color: #8e8e93; text-transform: uppercase; min-width: 75px; letter-spacing: 0.3px; }
    .meal-chip .recipe-name {
      font-size: 13px; flex: 1; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      color: #1c1c1e;
    }
    .meal-portion-btn {
      /* Small, numerous — no backdrop-filter. Opaque-ish fill is enough. */
      width: 26px; height: 26px; border-radius: 50%;
      border: 0.5px solid rgba(0, 0, 0, 0.08);
      background: rgba(255, 255, 255, 0.85);
      font-size: 15px; line-height: 1; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #3c3c43; flex-shrink: 0; padding: 0;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.8),
        0 1px 2px rgba(0, 0, 0, 0.04);
      transition: transform 0.08s ease, background 0.12s ease;
    }
    .meal-portion-btn:active {
      transform: scale(0.9);
      background: rgba(255, 255, 255, 0.95);
    }
    .meal-portion-btn[disabled] { opacity: 0.3; cursor: default; }
    .meal-portion-count {
      min-width: 20px; text-align: center;
      font-weight: 700; font-size: 14px; color: #2563eb;
      flex-shrink: 0;
    }
    .day-add-btn {
      width: 100%; padding: 8px;
      border: 1px dashed rgba(0, 0, 0, 0.12);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.3);
      font-size: 18px; color: #8e8e93; cursor: pointer;
      transition: background 0.12s ease;
    }
    .day-add-btn:active { background: rgba(255, 255, 255, 0.55); }

    /* ===== RECIPE DETAIL ===== */
    .detail-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
    .back-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #3c3c43; padding: 4px; }
    .servings-label { font-size: 15px; font-weight: 600; margin: 12px 0; color: #3c3c43; }
    .ingredient-row {
      display: flex; align-items: center; gap: 8px; padding: 10px 0;
      border-bottom: 0.5px solid rgba(0, 0, 0, 0.06);
    }
    .ingredient-amount {
      min-width: 70px; font-weight: 700; font-size: 14px; color: #2563eb;
      padding: 2px 4px; border-radius: 6px;
    }

    /* ===== SETTINGS MODAL ===== */
    .settings-list { list-style: none; }
    .settings-list li {
      padding: 14px 0; border-bottom: 0.5px solid rgba(0, 0, 0, 0.06);
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; font-size: 15px;
    }
    .settings-list li:active { color: #2563eb; }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: calc(188px + env(safe-area-inset-bottom, 0));
      left: 50%; transform: translateX(-50%) translateY(4px);
      background: rgba(28, 28, 30, 0.82);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      color: #fff;
      padding: 11px 20px; border-radius: 999px;
      border: 0.5px solid rgba(255, 255, 255, 0.12);
      font-size: 14px; font-weight: 500;
      z-index: 300; opacity: 0;
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.12),
        0 10px 30px rgba(0, 0, 0, 0.25);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ===== CHECKLIST GRID ===== */
    .checklist-grid {
      display: flex; flex-direction: column; gap: 6px;
    }
    .checklist-header {
      display: grid; grid-template-columns: 50px 1fr 1fr 1fr; gap: 6px;
      font-size: 11px; font-weight: 700; color: #8e8e93; text-transform: uppercase;
      margin-bottom: 4px; padding: 0 4px; letter-spacing: 0.3px;
    }
    .checklist-header span { text-align: center; }
    .checklist-row {
      display: grid; grid-template-columns: 50px 1fr 1fr 1fr; gap: 6px;
      align-items: center; padding: 12px 8px;
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(18px) saturate(170%);
      -webkit-backdrop-filter: blur(18px) saturate(170%);
      border-radius: 14px;
      border: 0.5px solid rgba(255, 255, 255, 0.4);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.7),
        0 1px 4px rgba(0, 0, 0, 0.03);
    }
    .checklist-row .day-label { font-weight: 600; font-size: 13px; }
    .checklist-row .day-label.today { color: #2563eb; }
    .checklist-row .cb-cell { text-align: center; }
    .checklist-row .cb-cell input[type="checkbox"] {
      width: 22px; height: 22px; accent-color: #2563eb; cursor: pointer;
    }

    /* ===== UTILITY ===== */
    .section-title { font-size: 12px; font-weight: 700; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.6px; margin: 18px 0 10px; }
    .empty-state { text-align: center; padding: 40px 16px; color: #8e8e93; font-size: 14px; }
    .hidden { display: none !important; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
    .mb-8 { margin-bottom: 8px; }
    .mb-16 { margin-bottom: 16px; }
    .gap-8 { gap: 8px; }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="top-bar">
    <h1>Menu App</h1>
    <div class="top-bar-actions">
      <button class="settings-btn" id="syncBtn" title="Sync">&#9729;</button>
      <button class="settings-btn" id="settingsBtn">&#9881;</button>
    </div>
  </div>

  <!-- TAB: RECIPES -->
  <div class="tab-content" id="tab-recipes"></div>

  <!-- TAB: MEAL PLAN -->
  <div class="tab-content" id="tab-mealplan"></div>

  <!-- TAB: GROCERY LIST -->
  <div class="tab-content" id="tab-grocery"></div>

  <!-- BOTTOM TAB BAR -->
  <div class="tab-bar">
    <button data-tab="mealplan">
      <span class="tab-icon">&#128197;</span>
      <span data-lang="mealPlan">Meal Plan</span>
    </button>
    <button data-tab="recipes">
      <span class="tab-icon">&#127858;</span>
      <span data-lang="recipes">Recipes</span>
    </button>
    <button data-tab="grocery">
      <span class="tab-icon">&#128722;</span>
      <span data-lang="groceryList">Compras</span>
    </button>
  </div>

  <!-- SETTINGS MODAL -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal">
      <h2 data-lang="settings">Settings</h2>
      <ul class="settings-list">
        <li id="exportBtn"><span data-lang="exportData">Export Data</span> <span>&#8594;</span></li>
        <li id="importBtn"><span data-lang="importData">Import Data</span> <span>&#8594;</span></li>
      </ul>
      <div style="margin-top:16px;border-top:1px solid #f0f0f0;padding-top:16px">
        <label style="font-size:13px;font-weight:600;color:#555" data-lang="githubToken">GitHub Token</label>
        <p style="font-size:12px;color:#999;margin:4px 0 8px" data-lang="tokenHelp">Create a token at GitHub → Settings → Developer Settings → Personal Access Tokens with 'gist' scope.</p>
        <div style="display:flex;gap:8px">
          <input type="password" id="ghTokenInput" placeholder="ghp_..." style="flex:1">
          <button class="btn btn-primary btn-sm" id="saveTokenBtn" data-lang="save">Save</button>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary btn-full" id="settingsClose" data-lang="cancel">Cancel</button>
      </div>
    </div>
  </div>

  <!-- IMPORT CONFIRM MODAL -->
  <div class="modal-overlay" id="importModal">
    <div class="modal">
      <h2 data-lang="importData">Import Data</h2>
      <p data-lang="mergeOrReplace">Merge with existing data or replace?</p>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="importMergeBtn" data-lang="merge">Merge</button>
        <button class="btn btn-danger" id="importReplaceBtn" data-lang="replace">Replace</button>
        <button class="btn btn-secondary" id="importCancelBtn" data-lang="cancel">Cancel</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- HIDDEN FILE INPUT -->
  <input type="file" id="fileInput" accept=".json" class="hidden">

  <script src="lang.js"></script>
  <script src="recipes-data.js"></script>
  <script>
// ===== STATE =====
const STORAGE_KEYS = {
  recipes: 'menuapp-recipes',
  mealplan: 'menuapp-mealplan',
  groceries: 'menuapp-groceries',
  lang: 'menuapp-lang',
  mealHistory: 'menuapp-meal-history',
  checklistPattern: 'menuapp-checklist-pattern',
  inventory: 'menuapp-inventory',
  ghToken: 'menuapp-gh-token',
  gistId: 'menuapp-gist-id',
};

let currentLang = 'es';
let customRecipes = JSON.parse(localStorage.getItem(STORAGE_KEYS.recipes) || '[]');
let mealPlan = JSON.parse(localStorage.getItem(STORAGE_KEYS.mealplan) || '{}');
let groceryData = JSON.parse(localStorage.getItem(STORAGE_KEYS.groceries) || '{"autoItems":[],"manualItems":[]}');
let mealHistory = JSON.parse(localStorage.getItem(STORAGE_KEYS.mealHistory) || '[]');
let checklistPattern = JSON.parse(localStorage.getItem(STORAGE_KEYS.checklistPattern) || 'null');
let inventoryData = JSON.parse(localStorage.getItem(STORAGE_KEYS.inventory) || '{"items":[],"customItems":[]}');

function saveRecipes() { localStorage.setItem(STORAGE_KEYS.recipes, JSON.stringify(customRecipes)); }
function saveMealPlan() { localStorage.setItem(STORAGE_KEYS.mealplan, JSON.stringify(mealPlan)); }
function saveGroceries() { localStorage.setItem(STORAGE_KEYS.groceries, JSON.stringify(groceryData)); }
function saveLang() { localStorage.setItem(STORAGE_KEYS.lang, currentLang); }
function saveMealHistory() { localStorage.setItem(STORAGE_KEYS.mealHistory, JSON.stringify(mealHistory)); }
function saveChecklistPattern() { localStorage.setItem(STORAGE_KEYS.checklistPattern, JSON.stringify(checklistPattern)); }
function saveInventory() { localStorage.setItem(STORAGE_KEYS.inventory, JSON.stringify(inventoryData)); }

function getAllRecipes() {
  const overrideIds = customRecipes.filter(r => r.overrides).map(r => r.overrides);
  const base = STARTER_RECIPES.filter(r => !overrideIds.includes(r.id));
  return [...base, ...customRecipes].filter(r => !r.deleted);
}

function getRecipeById(id) {
  // Check for a custom override of this recipe first
  const override = customRecipes.find(r => r.overrides === id && !r.deleted);
  if (override) return override;
  return customRecipes.find(r => r.id === id && !r.deleted) || STARTER_RECIPES.find(r => r.id === id);
}

// A recipe matches a category if its category equals that category, OR if the
// recipe is flagged as "lunchDinner" (flexible) and the requested category is
// either lunch or dinner. "lunchDinner" is a recipe-side marker only — the meal
// plan itself still has only breakfast/lunch/dinner slots.
function recipeMatchesCategory(recipe, category) {
  if (!recipe) return false;
  if (recipe.category === category) return true;
  if (recipe.category === 'lunchDinner' && (category === 'lunch' || category === 'dinner')) return true;
  return false;
}

// ===== i18n =====
function t(key) {
  return LANG[key] ? (LANG[key][currentLang] || LANG[key].en) : key;
}

function tName(obj) {
  if (!obj) return '';
  const s = typeof obj === 'string' ? obj : (obj[currentLang] || obj.en || '');
  return s.charAt(0).toUpperCase() + s.slice(1);
}

function updateLangUI() {
  document.querySelectorAll('[data-lang]').forEach(el => {
    const key = el.getAttribute('data-lang');
    if (LANG[key]) el.textContent = t(key);
  });
  document.querySelectorAll('[data-lang-placeholder]').forEach(el => {
    const key = el.getAttribute('data-lang-placeholder');
    if (LANG[key]) el.placeholder = t(key);
  });
}

// ===== TAB NAVIGATION =====
const tabButtons = document.querySelectorAll('.tab-bar button');
const tabContents = document.querySelectorAll('.tab-content');

function switchTab(tabName) {
  tabButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tabName));
  tabContents.forEach(tc => tc.classList.toggle('active', tc.id === 'tab-' + tabName));
  // Hide FAB when not on recipes list
  const fab = document.getElementById('recipeFab');
  if (fab) fab.classList.toggle('hidden', tabName !== 'recipes');
  if (tabName === 'recipes') {
    const savedView = localStorage.getItem('menuapp-view');
    const savedRecipeId = localStorage.getItem('menuapp-viewing-recipe');
    if (savedView === 'detail' && savedRecipeId && getRecipeById(savedRecipeId)) {
      renderRecipeDetail(savedRecipeId);
    } else if (savedView === 'form' && savedRecipeId && getRecipeById(savedRecipeId)) {
      openRecipeForm(getRecipeById(savedRecipeId));
    } else {
      renderRecipesList();
    }
  }
  if (tabName === 'mealplan') renderMealPlan();
  if (tabName === 'grocery') renderGroceryList();
  localStorage.setItem('menuapp-active-tab', tabName);
}

tabButtons.forEach(btn => btn.addEventListener('click', () => {
  if (btn.dataset.tab === 'recipes') {
    localStorage.setItem('menuapp-view', 'list');
    localStorage.removeItem('menuapp-viewing-recipe');
  }
  switchTab(btn.dataset.tab);
}));

// ===== SETTINGS MODAL =====
const settingsModal = document.getElementById('settingsModal');
document.getElementById('settingsBtn').addEventListener('click', () => {
  const saved = localStorage.getItem(STORAGE_KEYS.ghToken) || '';
  document.getElementById('ghTokenInput').value = saved;
  settingsModal.classList.add('active');
});
document.getElementById('settingsClose').addEventListener('click', () => settingsModal.classList.remove('active'));
settingsModal.addEventListener('click', (e) => { if (e.target === settingsModal) settingsModal.classList.remove('active'); });

// ===== TOAST =====
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// ===== EXPORT =====
document.getElementById('exportBtn').addEventListener('click', () => {
  const data = { customRecipes, mealPlan, groceryData, inventoryData, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'menu-app-data.json'; a.click();
  URL.revokeObjectURL(url);
  showToast(t('exportSuccess'));
  settingsModal.classList.remove('active');
});

// ===== IMPORT =====
const importModal = document.getElementById('importModal');
const fileInput = document.getElementById('fileInput');
let pendingImportData = null;

document.getElementById('importBtn').addEventListener('click', () => {
  settingsModal.classList.remove('active');
  fileInput.click();
});

fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      pendingImportData = JSON.parse(ev.target.result);
      importModal.classList.add('active');
    } catch { showToast('Invalid JSON file'); }
  };
  reader.readAsText(file);
  fileInput.value = '';
});

function applyImport(mode) {
  if (!pendingImportData) return;
  if (mode === 'replace') {
    customRecipes = pendingImportData.customRecipes || [];
    mealPlan = pendingImportData.mealPlan || {};
    groceryData = pendingImportData.groceryData || { autoItems: [], manualItems: [] };
    inventoryData = pendingImportData.inventoryData || { items: [], customItems: [] };
  } else {
    // Merge: add new custom recipes (by id), merge meal plan days, append manual grocery items
    const existingIds = new Set(customRecipes.map(r => r.id));
    (pendingImportData.customRecipes || []).forEach(r => {
      if (!existingIds.has(r.id)) customRecipes.push(r);
      else {
        const idx = customRecipes.findIndex(e => e.id === r.id);
        customRecipes[idx] = r;
      }
    });
    Object.assign(mealPlan, pendingImportData.mealPlan || {});
    const importManual = pendingImportData.groceryData?.manualItems || [];
    groceryData.manualItems = [...groceryData.manualItems, ...importManual];
    // Merge inventory: update amounts for existing items, add new ones
    if (pendingImportData.inventoryData) {
      const existingKeys = new Set(inventoryData.items.map(i => invKey(i)));
      (pendingImportData.inventoryData.items || []).forEach(item => {
        const k = invKey(item);
        if (existingKeys.has(k)) {
          const existing = inventoryData.items.find(i => invKey(i) === k);
          if (existing) existing.amount = item.amount;
        } else {
          inventoryData.items.push(item);
        }
      });
      const existingCustom = new Set(inventoryData.customItems.map(i => invKey(i)));
      (pendingImportData.inventoryData.customItems || []).forEach(item => {
        if (!existingCustom.has(invKey(item))) inventoryData.customItems.push(item);
      });
    }
  }
  saveRecipes(); saveMealPlan(); saveGroceries(); saveInventory();
  pendingImportData = null;
  importModal.classList.remove('active');
  showToast(t('importSuccess'));
  const activeTab = document.querySelector('.tab-bar button.active').dataset.tab;
  switchTab(activeTab);
}

document.getElementById('importMergeBtn').addEventListener('click', () => applyImport('merge'));
document.getElementById('importReplaceBtn').addEventListener('click', () => applyImport('replace'));
document.getElementById('importCancelBtn').addEventListener('click', () => { pendingImportData = null; importModal.classList.remove('active'); });
importModal.addEventListener('click', (e) => { if (e.target === importModal) { pendingImportData = null; importModal.classList.remove('active'); } });

// ===== GITHUB GIST SYNC =====
document.getElementById('saveTokenBtn').addEventListener('click', () => {
  const token = document.getElementById('ghTokenInput').value.trim();
  if (!token) return;
  localStorage.setItem(STORAGE_KEYS.ghToken, token);
  showToast(t('tokenSaved'));
});

document.getElementById('syncBtn').addEventListener('click', () => {
  const token = localStorage.getItem(STORAGE_KEYS.ghToken);
  if (!token) {
    showToast(t('syncNoToken'));
    settingsModal.classList.add('active');
    return;
  }
  showSyncModal();
});

function showSyncModal() {
  const modal = document.createElement('div');
  modal.className = 'modal-overlay active';
  modal.innerHTML = `
    <div class="modal">
      <h2>${t('sync')}</h2>
      <p style="margin-bottom:16px">${t('syncDirection')}</p>
      <div style="display:flex;flex-direction:column;gap:8px">
        <button class="btn btn-primary btn-full" id="syncUpBtn">${t('syncUpload')}</button>
        <button class="btn btn-secondary btn-full" id="syncDownBtn">${t('syncDownload')}</button>
        <button class="btn btn-secondary btn-full" id="syncCancelBtn">${t('cancel')}</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
  modal.querySelector('#syncCancelBtn').addEventListener('click', () => modal.remove());
  modal.querySelector('#syncUpBtn').addEventListener('click', async () => {
    modal.remove();
    await syncUpload();
  });
  modal.querySelector('#syncDownBtn').addEventListener('click', async () => {
    modal.remove();
    await syncDownload();
  });
}

function getSyncData() {
  return {
    customRecipes, mealPlan, groceryData, inventoryData, mealHistory, checklistPattern,
    lang: currentLang,
    activeTab: localStorage.getItem('menuapp-active-tab') || 'recipes',
    syncedAt: new Date().toISOString()
  };
}

function applySyncData(data) {
  customRecipes = data.customRecipes || [];
  mealPlan = data.mealPlan || {};
  groceryData = data.groceryData || { autoItems: [], manualItems: [] };
  inventoryData = data.inventoryData || { items: [], customItems: [] };
  mealHistory = data.mealHistory || [];
  checklistPattern = data.checklistPattern || null;
  if (data.lang) { currentLang = data.lang; saveLang(); }
  saveRecipes(); saveMealPlan(); saveGroceries(); saveInventory(); saveMealHistory(); saveChecklistPattern();
  updateLangUI();
  switchTab(data.activeTab || 'recipes');
}

async function syncUpload() {
  const token = localStorage.getItem(STORAGE_KEYS.ghToken);
  const gistId = localStorage.getItem(STORAGE_KEYS.gistId);
  const payload = { files: { 'menu-app-data.json': { content: JSON.stringify(getSyncData(), null, 2) } } };

  try {
    let res;
    if (gistId) {
      res = await fetch('https://api.github.com/gists/' + gistId, {
        method: 'PATCH',
        headers: { 'Authorization': 'token ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
    } else {
      payload.description = 'Menu App Sync Data';
      payload.public = false;
      res = await fetch('https://api.github.com/gists', {
        method: 'POST',
        headers: { 'Authorization': 'token ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
    }
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    localStorage.setItem(STORAGE_KEYS.gistId, data.id);
    showToast(t('syncSuccess'));
  } catch (e) {
    showToast(t('syncError'));
  }
}

async function syncDownload() {
  const token = localStorage.getItem(STORAGE_KEYS.ghToken);
  let gistId = localStorage.getItem(STORAGE_KEYS.gistId);

  try {
    // If no gist ID stored locally, find it by searching user's gists
    if (!gistId) {
      const listRes = await fetch('https://api.github.com/gists', {
        headers: { 'Authorization': 'token ' + token }
      });
      if (!listRes.ok) throw new Error(listRes.status);
      const gists = await listRes.json();
      const found = gists.find(g => g.files['menu-app-data.json']);
      if (!found) throw new Error('No Menu App gist found');
      gistId = found.id;
      localStorage.setItem(STORAGE_KEYS.gistId, gistId);
    }

    const res = await fetch('https://api.github.com/gists/' + gistId, {
      headers: { 'Authorization': 'token ' + token }
    });
    if (!res.ok) throw new Error(res.status);
    const gist = await res.json();
    const content = gist.files['menu-app-data.json']?.content;
    if (!content) throw new Error('No data file in gist');
    const data = JSON.parse(content);
    applySyncData(data);
    showToast(t('syncSuccess'));
  } catch (e) {
    showToast(t('syncError'));
  }
}

// ===== RENDER STUBS (implemented in next tasks) =====
let currentCategory = 'all';
let currentSearch = '';
let currentView = localStorage.getItem('menuapp-view') || 'list';
let viewingRecipeId = localStorage.getItem('menuapp-viewing-recipe') || null;

function renderRecipesList() {
  currentView = 'list';
  viewingRecipeId = null;
  localStorage.setItem('menuapp-view', 'list');
  localStorage.removeItem('menuapp-viewing-recipe');
  const container = document.getElementById('tab-recipes');
  const recipes = getAllRecipes();
  const filtered = recipes.filter(r => {
    const matchCat = currentCategory === 'all' || recipeMatchesCategory(r, currentCategory);
    const matchSearch = currentSearch === '' ||
      tName(r.name).toLowerCase().includes(currentSearch.toLowerCase());
    return matchCat && matchSearch;
  }).sort((a, b) =>
    // Always alphabetical by the displayed (localized) name. localeCompare
    // with 'es' handles ñ and accented letters correctly.
    tName(a.name).localeCompare(tName(b.name), 'es', { sensitivity: 'base' })
  );

  container.innerHTML = `
    <input type="text" id="recipeSearch" value="${currentSearch}"
      data-lang-placeholder="search" data-t-placeholder="search" placeholder="${t('search')}"
      style="margin-bottom:8px;">
    <div class="chip-row">
      ${['all','breakfast','lunch','dinner'].map(cat =>
        `<button class="chip ${currentCategory === cat ? 'active' : ''}" data-cat="${cat}" data-t="${cat}">
          ${t(cat)}
        </button>`
      ).join('')}
    </div>
    ${filtered.length === 0 ? '<div class="empty-state">No recipes found</div>' :
      filtered.map(r => `
        <div class="card" data-recipe-id="${r.id}">
          <div class="card-title" data-tname='${JSON.stringify(r.name)}'>${tName(r.name)}</div>
          <div class="card-meta">
            ${r.servings} <span data-t="servings">${t('servings').toLowerCase()}</span>
          </div>
        </div>
      `).join('')}
  `;

  // FAB
  let fab = document.getElementById('recipeFab');
  if (!fab) {
    fab = document.createElement('button');
    fab.id = 'recipeFab';
    fab.className = 'fab';
    fab.textContent = '+';
    document.body.appendChild(fab);
    fab.addEventListener('click', () => openRecipeForm(null));
  }
  fab.classList.remove('hidden');

  // Event: search
  document.getElementById('recipeSearch').addEventListener('input', (e) => {
    currentSearch = e.target.value;
    renderRecipesList();
  });

  // Event: category chips
  container.querySelectorAll('.chip[data-cat]').forEach(chip => {
    chip.addEventListener('click', () => {
      currentCategory = chip.dataset.cat;
      renderRecipesList();
    });
  });

  // Event: card clicks
  container.querySelectorAll('.card[data-recipe-id]').forEach(card => {
    card.addEventListener('click', () => renderRecipeDetail(card.dataset.recipeId));
  });
}

function renderRecipeDetail(recipeId) {
  currentView = 'detail';
  viewingRecipeId = recipeId;
  localStorage.setItem('menuapp-view', 'detail');
  localStorage.setItem('menuapp-viewing-recipe', recipeId);
  const recipe = getRecipeById(recipeId);
  if (!recipe) return renderRecipesList();

  const container = document.getElementById('tab-recipes');
  const fab = document.getElementById('recipeFab');
  if (fab) fab.classList.add('hidden');

  container.innerHTML = `
    <div class="detail-header">
      <button class="back-btn" id="backToList">&#8592;</button>
      <div>
        <button class="btn btn-sm btn-secondary" id="editRecipeBtn" data-t="editRecipe">${t('editRecipe')}</button>
        <button class="btn btn-sm btn-danger" id="deleteRecipeBtn" data-t="deleteRecipe">${t('deleteRecipe')}</button>
      </div>
    </div>
    <h2 data-tname='${JSON.stringify(recipe.name)}'>${tName(recipe.name)}</h2>
    <div class="servings-label">
      <span data-t="servings">${t('servings')}</span>: ${recipe.servings}
    </div>
    <div class="section-title" data-t="ingredients">${t('ingredients')}</div>
    <div id="ingredientsList">
      ${recipe.ingredients.map((ing, i) => {
        // Display exactly what's stored. The form is the source of truth for
        // ingredient quantities; nothing between storage and display rescales.
        return `<div class="ingredient-row">
          <span class="ingredient-amount" data-idx="${i}">${ing.amount} ${ing.unit}</span>
          <span data-tname='${JSON.stringify(ing.name)}'>${tName(ing.name)}</span>
        </div>`;
      }).join('')}
    </div>
  `;

  // Back button
  document.getElementById('backToList').addEventListener('click', renderRecipesList);

  // Delete recipe (custom or starter)
  document.getElementById('deleteRecipeBtn').addEventListener('click', () => {
    if (!confirm(t('confirmDelete'))) return;
    if (recipe.isCustom) {
      customRecipes = customRecipes.filter(r => r.id !== recipe.id);
    } else {
      // Hide starter recipe by adding a deleted marker
      customRecipes.push({ id: recipe.id + '-deleted', overrides: recipe.id, deleted: true, isCustom: true });
    }
    saveRecipes();
    renderRecipesList();
  });

  // Edit recipe — pure "open form" action; no persistence happens here.
  // If this is a starter, the form's Save handler will create the override on save.
  document.getElementById('editRecipeBtn').addEventListener('click', () => {
    openRecipeForm(recipe);
  });
}

function openRecipeForm(existingRecipe) {
  currentView = 'form';
  localStorage.setItem('menuapp-view', 'form');
  if (existingRecipe) localStorage.setItem('menuapp-viewing-recipe', existingRecipe.id);
  const container = document.getElementById('tab-recipes');
  const fab = document.getElementById('recipeFab');
  if (fab) fab.classList.add('hidden');

  const r = existingRecipe || {
    id: '', name: { en: '', es: '' }, category: 'dinner', servings: 2,
    prepTime: 0, cookTime: 0, ingredients: [], instructions: { en: [], es: [] }, isCustom: true
  };
  const isEdit = !!existingRecipe;

  container.innerHTML = `
    <div class="detail-header">
      <button class="back-btn" id="formBack">&#8592;</button>
      <h2 data-t="${isEdit ? 'editRecipe' : 'addRecipe'}">${isEdit ? t('editRecipe') : t('addRecipe')}</h2>
    </div>
    <div class="mb-8">
      <label style="font-size:13px;color:#888">${t('recipeName')}</label>
      <input type="text" id="rNameEs" value="${r.name.es || r.name.en || ''}">
    </div>
    <div class="mb-8">
      <label style="font-size:13px;color:#888" data-t="category">${t('category')}</label>
      <select id="rCategory">
        ${['breakfast','lunch','dinner','lunchDinner'].map(cat =>
          `<option value="${cat}" ${r.category === cat ? 'selected' : ''} data-t="${cat}">${t(cat)}</option>`
        ).join('')}
      </select>
    </div>
    <div class="mb-8">
      <label style="font-size:13px;color:#888" data-t="servingsCount">${t('servingsCount')}</label>
      <input type="number" id="rServings" value="${r.servings}" min="1">
    </div>

    <div class="section-title" data-t="ingredients">${t('ingredients')}</div>
    <div id="ingredientsForm">
      ${r.ingredients.map((ing, i) => ingredientFormRow(ing, i)).join('')}
    </div>
    <button class="btn btn-sm btn-secondary mb-16" id="addIngBtn">+ <span data-t="addIngredient">${t('addIngredient')}</span></button>

    <button class="btn btn-primary btn-full" id="saveRecipeBtn" data-t="save">${t('save')}</button>
  `;

  let ingCount = r.ingredients.length;

  document.getElementById('formBack').addEventListener('click', () => {
    if (isEdit) renderRecipeDetail(r.id);
    else renderRecipesList();
  });

  document.getElementById('addIngBtn').addEventListener('click', () => {
    const div = document.getElementById('ingredientsForm');
    div.insertAdjacentHTML('beforeend', ingredientFormRow({ name: { en: '', es: '' }, amount: 0, unit: 'g' }, ingCount));
    ingCount++;
  });


  // Delegated remove buttons
  container.addEventListener('click', (e) => {
    if (e.target.classList.contains('remove-ing')) e.target.closest('.ing-row').remove();
  });

  document.getElementById('saveRecipeBtn').addEventListener('click', () => {
    const name = document.getElementById('rNameEs').value.trim();
    if (!name) { showToast('El nombre es requerido'); return; }

    // Determine the saved id and any override link:
    //  - New recipe   → generate id from the name
    //  - Edit custom  → keep its id; preserve any existing override link
    //  - Edit starter → this save creates the override (id = <starter>-custom,
    //    overrides = <starter>). No persistence happens until this point, so
    //    cancelling from the form leaves the starter untouched.
    let savedId, savedOverrides;
    if (!isEdit) {
      savedId = name.toLowerCase().replace(/[^a-záéíóúñü0-9]+/g, '-');
    } else if (r.isCustom) {
      savedId = r.id;
      if (r.overrides) savedOverrides = r.overrides;
    } else {
      savedId = r.id + '-custom';
      savedOverrides = r.id;
    }

    const newRecipe = {
      id: savedId,
      name: { en: name, es: name },
      category: document.getElementById('rCategory').value,
      servings: parseInt(document.getElementById('rServings').value) || 2,
      prepTime: 0,
      cookTime: 0,
      ingredients: collectIngredients(),
      instructions: { en: [], es: [] },
      isCustom: true
    };
    if (savedOverrides) newRecipe.overrides = savedOverrides;

    if (isEdit) {
      const idx = customRecipes.findIndex(cr => cr.id === newRecipe.id);
      if (idx >= 0) customRecipes[idx] = newRecipe;
      else customRecipes.push(newRecipe);
    } else {
      // Check for duplicate id
      if (getRecipeById(newRecipe.id)) newRecipe.id += '-' + Date.now();
      customRecipes.push(newRecipe);
    }
    saveRecipes();
    renderRecipeDetail(newRecipe.id);
  });
}

function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }

function ingredientFormRow(ing, idx) {

    <input type="text" placeholder="Ingrediente" value="${esc(ing.name.es || ing.name.en)}" style="flex:3" class="ing-name-es" data-idx="${idx}">
    <input type="number" value="${ing.amount}" style="flex:1" class="ing-amount" data-idx="${idx}" min="0" step="any">

        `<option value="${u}" ${ing.unit === u ? 'selected' : ''}>${u}</option>`

    </select>
