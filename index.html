}


function collectIngredients() {
  const rows = document.querySelectorAll('.ing-row');
  return Array.from(rows).map(row => {
    const name = row.querySelector('.ing-name-es').value.trim();
    return {
      name: { en: name, es: name },
      amount: parseFloat(row.querySelector('.ing-amount').value) || 0,
      unit: row.querySelector('.ing-unit').value
    };
  }).filter(ing => ing.name.es);
}


function getWeekDates() {
  const today = new Date();
  const day = today.getDay(); // 0=Sun
  const monday = new Date(today);
  monday.setDate(today.getDate() - ((day + 6) % 7));
  const dates = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    dates.push(d);
  }
  return dates;
}

function dateKey(d) {
  return d.toISOString().split('T')[0];
}

// Resolve how many portions a meal is scheduled for. Legacy meals (created
// before portion tracking existed) have no `servings` field — fall back to
// the recipe's own servings so they display and aggregate sensibly.
function getMealServings(meal, recipe) {
  if (meal && typeof meal.servings === 'number' && meal.servings > 0) return meal.servings;
  return (recipe && typeof recipe.servings === 'number' && recipe.servings > 0) ? recipe.servings : 1;
}

// ===== CHECKLIST VIEW & GENERATION =====
const DAY_NAMES = ['mon','tue','wed','thu','fri','sat','sun'];
const MEAL_SLOTS = ['breakfast','lunch','dinner'];

function renderChecklistView() {
  const container = document.getElementById('tab-mealplan');
  const weekDates = getWeekDates();
  const todayKey = dateKey(new Date());

  // Load pattern or default to all unchecked
  const pattern = checklistPattern || {};

  container.innerHTML = `
    <div style="font-size:18px;font-weight:700;margin-bottom:12px">${t('generatePlan')}</div>
    <div class="checklist-header">
      <span></span>
      <span>${t('brkfst')}</span>
      <span>${t('lunchShort')}</span>
      <span>${t('dinnerShort')}</span>
    </div>
    <div class="checklist-grid">
      ${weekDates.map((d, i) => {
        const dn = DAY_NAMES[i];
        const isToday = dateKey(d) === todayKey;
        const dp = pattern[dn] || {};
        return `<div class="checklist-row">
          <div class="day-label ${isToday ? 'today' : ''}">${t(dn)}</div>
          ${MEAL_SLOTS.map(slot => `
            <div class="cb-cell">
              <input type="checkbox" data-day="${dn}" data-slot="${slot}"
                ${dp[slot] ? 'checked' : ''}>
            </div>
          `).join('')}
        </div>`;
      }).join('')}
    </div>
    <button class="btn btn-primary btn-full" id="generateBtn" style="margin-top:16px">${t('generate')}</button>
    ${weekHasMeals() ? `<button class="btn btn-secondary btn-full" id="backToWeekBtn" style="margin-top:8px">${t('cancel')}</button>` : ''}
  `;

  // Save pattern on each checkbox change
  container.querySelectorAll('.checklist-grid input[type="checkbox"]').forEach(cb => {
    cb.addEventListener('change', () => {
      if (!checklistPattern) checklistPattern = {};
      const dn = cb.dataset.day;
      const slot = cb.dataset.slot;
      if (!checklistPattern[dn]) checklistPattern[dn] = {};
      checklistPattern[dn][slot] = cb.checked;
      saveChecklistPattern();
    });
  });

  // Generate button
  document.getElementById('generateBtn').addEventListener('click', () => {
    const selections = collectChecklistSelections();
    if (selections.length === 0) { showToast('Check at least one meal'); return; }

    if (weekHasMeals()) {
      showReplaceOrFillModal(selections);
    } else {
      runGeneration(selections, 'replace');
    }
  });

  // Back to weekly view button
  const backBtn = document.getElementById('backToWeekBtn');
  if (backBtn) backBtn.addEventListener('click', renderMealPlan);
}

function collectChecklistSelections() {
  const selections = [];
  const weekDates = getWeekDates();
  document.querySelectorAll('.checklist-grid input[type="checkbox"]:checked').forEach(cb => {
    const dayIdx = DAY_NAMES.indexOf(cb.dataset.day);
    selections.push({
      date: dateKey(weekDates[dayIdx]),
      dayName: cb.dataset.day,
      slot: cb.dataset.slot
    });
  });
  return selections;
}

function weekHasMeals() {
  const weekDates = getWeekDates();
  return weekDates.some(d => (mealPlan[dateKey(d)] || []).length > 0);
}

function showReplaceOrFillModal(selections) {
  const modal = document.createElement('div');
  modal.className = 'modal-overlay active';
  modal.innerHTML = `
    <div class="modal">
      <h2>${t('generatePlan')}</h2>
      <p>${t('replaceOrFill')}</p>
      <div class="modal-actions" style="flex-direction:column">
        <button class="btn btn-danger btn-full" id="genReplaceBtn">${t('replaceAll')}</button>
        <button class="btn btn-primary btn-full" id="genFillBtn">${t('fillEmpty')}</button>
        <button class="btn btn-secondary btn-full" id="genCancelBtn">${t('cancel')}</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
  modal.querySelector('#genCancelBtn').addEventListener('click', () => modal.remove());
  modal.querySelector('#genReplaceBtn').addEventListener('click', () => {
    modal.remove();
    runGeneration(selections, 'replace');
  });
  modal.querySelector('#genFillBtn').addEventListener('click', () => {
    modal.remove();
    runGeneration(selections, 'fill');
  });
}

function runGeneration(selections, mode) {
  const weekDates = getWeekDates();

  if (mode === 'replace') {
    weekDates.forEach(d => delete mealPlan[dateKey(d)]);
  }

  // Filter out slots that already have a meal in fill mode
  let slotsToFill = selections;
  if (mode === 'fill') {
    slotsToFill = selections.filter(sel => {
      const existing = mealPlan[sel.date] || [];
      return !existing.some(m => m.slot === sel.slot);
    });
  }

  // Group by category to process most-constrained first.
  // recipeMatchesCategory handles the "lunchDinner" flexible-category recipes,
  // making them candidates for both lunch and dinner slots.
  const allRecipes = getAllRecipes();
  const byCategory = {};
  MEAL_SLOTS.forEach(slot => {
    byCategory[slot] = allRecipes.filter(r => recipeMatchesCategory(r, slot));
  });

  // Check for empty categories
  const missingCategories = MEAL_SLOTS.filter(slot =>
    slotsToFill.some(s => s.slot === slot) && byCategory[slot].length === 0
  );
  if (missingCategories.length > 0) {
    const names = missingCategories.map(c => t(c)).join(', ');
    showToast(t('noRecipesInCategory') + names);
    slotsToFill = slotsToFill.filter(s => !missingCategories.includes(s.slot));
  }

  if (slotsToFill.length === 0) { renderMealPlan(); return; }

  // Sort day-by-day (primary) then most-constrained within each day (secondary).
  // Day-by-day ensures the same-day penalty kicks in for lunchDinner recipes
  // before the other slots on that day are filled. Within each day, the most
  // constrained category fills first to avoid starving small pools.
  const weekDateKeys = weekDates.map(d => dateKey(d));
  slotsToFill.sort((a, b) => {
    const dayA = weekDateKeys.indexOf(a.date);
    const dayB = weekDateKeys.indexOf(b.date);
    if (dayA !== dayB) return dayA - dayB;
    return byCategory[a.slot].length - byCategory[b.slot].length;
  });

  const assigned = []; // track { recipeId, date, slot } for within-week uniqueness

  slotsToFill.forEach(sel => {
    const candidates = byCategory[sel.slot];
    if (candidates.length === 0) return;

    const scored = scoreRecipes(candidates, sel.date, sel.dayName, assigned);
    const pick = scored[0];

    if (!mealPlan[sel.date]) mealPlan[sel.date] = [];
    mealPlan[sel.date].push({ slot: sel.slot, recipeId: pick.id, servings: pick.servings });
    assigned.push({ recipeId: pick.id, date: sel.date, slot: sel.slot });
    mealHistory.push({ recipeId: pick.id, date: sel.date, slot: sel.slot });
  });

  saveMealPlan();
  saveMealHistory();
  renderMealPlan();
}

// ---------- Protein auto-detection ----------
//
// Users don't want the same protein (beef, chicken, fish…) on consecutive
// days. Rather than requiring them to tag every recipe manually, we scan
// ingredient names for a handful of keywords in English + Spanish. The
// detection is deliberately broad — a recipe can carry multiple proteins
// (e.g. "rice, beans and chicken" tags chicken + beans) and the scoring
// penalizes any overlap with neighboring days.
//
// Dairy (milk/cheese/yogurt/butter) is intentionally excluded — the user's
// concern is meat-level proteins, not "cheese two days in a row".
const PROTEIN_KEYWORDS = {
  beef:    ['beef', 'steak', 'ground beef', 'lomo', 'carne molida', 'carne de res', 'bistec', 'ternera'],
  chicken: ['chicken', 'pollo', 'pechuga', 'muslo'],
  pork:    ['pork', 'bacon', 'cerdo', 'chancho', 'tocino', 'jamon'],
  fish:    ['fish', 'salmon', 'tuna', 'pescado', 'atun', 'bacalao', 'trucha'],
  eggs:    ['egg', 'huevo'],
  turkey:  ['turkey', 'pavo'],
  shrimp:  ['shrimp', 'prawn', 'camaron', 'langostino'],
  lamb:    ['lamb', 'cordero'],
  beans:   ['bean', 'lentil', 'chickpea', 'frijol', 'lenteja', 'garbanzo'],
};

// Lowercase + strip diacritics, so "atún" → "atun" matches the keyword table.
function normalizeProteinText(s) {
  return (s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

function getRecipeProteins(recipe) {
  if (!recipe || !Array.isArray(recipe.ingredients)) return new Set();
  const joined = recipe.ingredients.map(ing => {
    const n = ing.name;
    return typeof n === 'object' ? `${n.en || ''} ${n.es || ''}` : (n || '');
  }).join(' ');
  const text = normalizeProteinText(joined);
  const proteins = new Set();
  for (const [protein, keywords] of Object.entries(PROTEIN_KEYWORDS)) {
    if (keywords.some(kw => text.includes(kw))) proteins.add(protein);
  }
  return proteins;
}

// ---------- Recipe scoring for auto-generation ----------
//
// Score components (from strongest to weakest):
//
//   Same-day penalty        −1000 per use on this date
//     Prevents a lunchDinner recipe from being lunch AND dinner on Monday.
//
//   Within-week penalty     escalating: −100 × n(n+1)/2  (−100, −300, −600…)
//     1st reuse is −100.  2nd is −300.  3rd is −600.  Makes triple-use
//     nearly impossible; doubles happen only when the pool is too small.
//
//   Protein proximity       −40 same day, −30 one day away, −10 two days
//                           away, per overlapping protein
//     If Monday lunch was chicken, Monday dinner candidates with chicken
//     lose 40. If yesterday was beef AND today's lunch was also beef, a
//     beef recipe up for tonight's dinner loses 70 (40 + 30).
//
//   Recency bonus           min(daysSince, 30)  (never-used → 30)
//     Capped so penalties above always dominate.  Never-used recipes get
//     the cap — they're preferred but not infinitely so.
//
//   4-week frequency        −5 per use in last 28 days
//     Catches recipes that are "technically not recent" but have been
//     scheduled too often.  A recipe used 3× in 4 weeks loses 15 pts.
//
//   Same-weekday penalty    −15 / weeksSince, for each prior use on the
//                           same weekday.  Fades with time.
//
//   Random tiebreaker       0 – 0.5 pts
//
function scoreRecipes(candidates, dateStr, dayName, alreadyAssigned) {
  const today = new Date();
  const todayMs = today.getTime();
  const fourWeeksAgo = todayMs - 28 * 86400000;
  const dateMs = new Date(dateStr + 'T12:00:00').getTime();

  // Collect meals within ±2 days of this slot's date from all three sources
  // (current meal plan, this-run assignments, historical record), deduped
  // by (date + recipeId) so the same meal counted in multiple sources only
  // contributes once. Same-date (daysDiff = 0) is INCLUDED for the protein
  // check — picking chicken for both lunch and dinner on the same day is
  // the most noticeable form of protein repetition. Same-recipe same-day
  // is still handled separately by the stronger same-day penalty.
  const nearbyKeys = new Set();
  const nearby = [];
  const addIfNearby = (date, recipeId) => {
    if (!date || !recipeId) return;
    const key = date + '|' + recipeId;
    if (nearbyKeys.has(key)) return;
    const mealMs = new Date(date + 'T12:00:00').getTime();
    const daysDiff = Math.abs((mealMs - dateMs) / 86400000);
    if (daysDiff <= 2) {
      nearbyKeys.add(key);
      nearby.push({ recipeId, daysDiff });
    }
  };
  for (const [date, meals] of Object.entries(mealPlan)) {
    for (const meal of meals) addIfNearby(date, meal.recipeId);
  }
  for (const a of alreadyAssigned) addIfNearby(a.date, a.recipeId);
  for (const h of mealHistory) addIfNearby(h.date, h.recipeId);

  // Precompute proteins for each nearby meal once; each candidate reuses this.
  const nearbyWithProteins = nearby.map(m => ({
    recipeId: m.recipeId,
    daysDiff: m.daysDiff,
    proteins: getRecipeProteins(getRecipeById(m.recipeId)),
  }));

  const scored = candidates.map(recipe => {
    let score = 0;

    // 1. Recency bonus — capped at 30 so penalties actually dominate.
    const lastUse = [...mealHistory].reverse().find(h => h.recipeId === recipe.id);
    if (lastUse) {
      const daysSince = Math.max(1, Math.floor((todayMs - new Date(lastUse.date).getTime()) / 86400000));
      score += Math.min(daysSince, 30);
    } else {
      score += 30; // never used = same as 30 days ago
    }

    // 2. 4-week frequency penalty — how often has it appeared recently?
    const recentUseCount = mealHistory.filter(h =>
      h.recipeId === recipe.id && new Date(h.date).getTime() > fourWeeksAgo
    ).length;
    score -= recentUseCount * 5;

    // 3. Same-weekday penalty — avoid Taco Tuesday every Tuesday.
    const sameWeekdayUses = mealHistory.filter(h =>
      h.recipeId === recipe.id && getDayNameFromDate(h.date) === dayName
    );
    sameWeekdayUses.forEach(use => {
      const weeksSince = Math.max(1, Math.floor((todayMs - new Date(use.date).getTime()) / (7 * 86400000)));
      score -= 15 / weeksSince;
    });

    // 4. Within-week uniqueness — escalating triangular penalty.
    const usedThisWeek = alreadyAssigned.filter(a => a.recipeId === recipe.id).length;
    score -= usedThisWeek * (usedThisWeek + 1) / 2 * 100;

    // 5. Same-day penalty — avoid lunchDinner recipe appearing twice in one day.
    const usedThisDay = alreadyAssigned.filter(a =>
      a.recipeId === recipe.id && a.date === dateStr
    ).length;
    score -= usedThisDay * 1000;

    // 6. Protein proximity — no beef twice in one day, no chicken two days
    //    in a row, etc.  Weight scales with closeness:
    //       same day        → 40 per overlapping protein (worst case)
    //       1 day apart     → 30
    //       2 days apart    → 10
    //    Skipped when the neighbor IS this same recipe: that case is already
    //    covered by within-week / same-day penalties, and double-dipping
    //    would make existing scheduled meals of the same recipe forever
    //    unbeatable.
    const myProteins = getRecipeProteins(recipe);
    if (myProteins.size > 0) {
      for (const n of nearbyWithProteins) {
        if (n.recipeId === recipe.id) continue;
        if (n.proteins.size === 0) continue;
        let overlap = 0;
        for (const p of myProteins) if (n.proteins.has(p)) overlap++;
        if (overlap > 0) {
          const weight = n.daysDiff === 0 ? 40 : (n.daysDiff <= 1 ? 30 : 10);
          score -= overlap * weight;
        }
      }
    }

    // Random tiebreaker
    score += Math.random() * 0.5;

    return { ...recipe, _score: score };
  });

  scored.sort((a, b) => b._score - a._score);
  return scored;
}

function getDayNameFromDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const dayIdx = (d.getDay() + 6) % 7; // 0=Mon
  return DAY_NAMES[dayIdx];
}

function addToMealHistory(recipeId, date, slot) {
  mealHistory.push({ recipeId, date, slot });
  saveMealHistory();
}

// ===== MEAL PLAN WEEKLY VIEW =====
function renderMealPlan() {
  // If no meals this week, show checklist instead
  if (!weekHasMeals()) {
    renderChecklistView();
    return;
  }

  const container = document.getElementById('tab-mealplan');
  const weekDates = getWeekDates();
  const dayNames = DAY_NAMES;
  const todayKey = dateKey(new Date());

  container.innerHTML = `
    <div class="flex-between mb-8">
      <div class="section-title" style="margin:0">${t('mealPlan')}</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-sm btn-primary" id="newPlanBtn">${t('newPlan')}</button>
        <button class="btn btn-sm btn-danger" id="clearWeekBtn">${t('clearWeek')}</button>
      </div>
    </div>
    <div class="week-row">
      ${weekDates.map((d, i) => {
        const key = dateKey(d);
        const isToday = key === todayKey;
        const meals = mealPlan[key] || [];
        const slotOrder = ['breakfast','lunch','dinner'];
        const sorted = [...meals].sort((a, b) => {
          const ai = slotOrder.indexOf(a.slot) >= 0 ? slotOrder.indexOf(a.slot) : 99;
          const bi = slotOrder.indexOf(b.slot) >= 0 ? slotOrder.indexOf(b.slot) : 99;
          return ai - bi;
        });
        return `<div class="day-col ${isToday ? 'today' : ''}">
          <div class="day-header ${isToday ? 'today' : ''}">
            ${t(dayNames[i])}
            <span class="day-date">${d.getDate()}/${d.getMonth()+1}</span>
          </div>
          <div class="meal-chips">
            ${sorted.map((meal, mi) => {
              const recipe = getRecipeById(meal.recipeId);
              const slotLabel = meal.slot.startsWith('custom:') ? meal.slot.slice(7) : t(meal.slot);
              const servings = getMealServings(meal, recipe);
              // Find the real index in the unsorted array so +/- and click handlers
              // mutate the correct entry even after the display has been sorted.
              const realIdx = meals.indexOf(meal);
              return `<div class="meal-chip" data-date="${key}" data-meal-idx="${realIdx}" data-recipe-id="${meal.recipeId}">
                <div class="meal-chip-body">
                  <span class="slot-label">${slotLabel}</span>
                  <span class="recipe-name">${recipe ? tName(recipe.name) : '?'}</span>
                </div>
                <button class="meal-portion-btn" data-action="dec" aria-label="−" ${servings <= 1 ? 'disabled' : ''}>−</button>
                <span class="meal-portion-count">${servings}</span>
                <button class="meal-portion-btn" data-action="inc" aria-label="+">+</button>
              </div>`;
            }).join('')}
            <button class="day-add-btn" data-date="${key}">+</button>
          </div>
        </div>`;
      }).join('')}
    </div>
  `;

  // New Plan button
  document.getElementById('newPlanBtn').addEventListener('click', renderChecklistView);

  // Clear week
  document.getElementById('clearWeekBtn').addEventListener('click', () => {
    if (!confirm(t('confirmClearWeek'))) return;
    weekDates.forEach(d => delete mealPlan[dateKey(d)]);
    saveMealPlan();
    renderMealPlan();
  });

  // Add meal buttons
  container.querySelectorAll('.day-add-btn').forEach(btn => {
    btn.addEventListener('click', () => openAddMealFlow(btn.dataset.date));
  });

  // Portion +/- buttons: adjust meal.servings in place, persist, and update the
  // chip's DOM directly (no full re-render, so scroll position is preserved).
  // Grocery list re-reads mealPlan on next view, so it picks up the new totals.
  container.querySelectorAll('.meal-portion-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const chip = btn.closest('.meal-chip');
      const key = chip.dataset.date;
      const mealIdx = parseInt(chip.dataset.mealIdx, 10);
      const meals = mealPlan[key] || [];
      const meal = meals[mealIdx];
      if (!meal) return;
      const recipe = getRecipeById(meal.recipeId);
      const current = getMealServings(meal, recipe);
      const delta = btn.dataset.action === 'inc' ? 1 : -1;
      const next = Math.max(1, current + delta);
      if (next === current) return;
      meal.servings = next;
      saveMealPlan();
      chip.querySelector('.meal-portion-count').textContent = next;
      const decBtn = chip.querySelector('.meal-portion-btn[data-action="dec"]');
      if (next <= 1) decBtn.setAttribute('disabled', '');
      else decBtn.removeAttribute('disabled');
    });
  });

  // Edit or remove meal on body click (buttons stopPropagation, so they don't reach here)
  container.querySelectorAll('.meal-chip-body').forEach(body => {
    body.addEventListener('click', () => {
      const chip = body.closest('.meal-chip');
      const key = chip.dataset.date;
      const mealIdx = parseInt(chip.dataset.mealIdx, 10);
      const meals = mealPlan[key] || [];
      const meal = meals[mealIdx];
      if (!meal) return;

      const modal = document.createElement('div');
      modal.className = 'modal-overlay active';
      modal.innerHTML = `
        <div class="modal">
          <h2>${body.querySelector('.recipe-name').textContent}</h2>
          <div style="display:flex;flex-direction:column;gap:8px">
            <button class="btn btn-primary btn-full" id="changeMealBtn">${t('editRecipe')}</button>
            <button class="btn btn-danger btn-full" id="removeMealBtn">${t('removeMeal')}</button>
            <button class="btn btn-secondary btn-full" id="cancelMealBtn">${t('cancel')}</button>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
      modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
      modal.querySelector('#cancelMealBtn').addEventListener('click', () => modal.remove());

      modal.querySelector('#removeMealBtn').addEventListener('click', () => {
        meals.splice(mealIdx, 1);
        if (meals.length === 0) delete mealPlan[key];
        else mealPlan[key] = meals;
        saveMealPlan();
        modal.remove();
        renderMealPlan();
      });

      modal.querySelector('#changeMealBtn').addEventListener('click', () => {
        modal.remove();
        openRecipePicker(key, meal.slot, mealIdx);
      });
    });
  });
}

function openAddMealFlow(dateStr) {
  const modal = document.createElement('div');
  modal.className = 'modal-overlay active';
  modal.innerHTML = `
    <div class="modal">
      <h2>${t('selectSlot')}</h2>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${['breakfast','lunch','dinner'].map(slot =>
          `<button class="btn btn-secondary btn-full slot-pick" data-slot="${slot}">${t(slot)}</button>`
        ).join('')}
        <button class="btn btn-secondary btn-full slot-pick" data-slot="custom">${t('customSlot')}</button>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary btn-full close-modal">${t('cancel')}</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);

  modal.querySelector('.close-modal').addEventListener('click', () => modal.remove());
  modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });

  modal.querySelectorAll('.slot-pick').forEach(btn => {
    btn.addEventListener('click', () => {
      const slot = btn.dataset.slot;
      if (slot === 'custom') {
        const name = prompt(t('customSlotName'));
        if (!name) return;
        modal.remove();
        openRecipePicker(dateStr, 'custom:' + name);
      } else {
        modal.remove();
        openRecipePicker(dateStr, slot);
      }
    });
  });
}

function openRecipePicker(dateStr, slot, replaceMealIdx) {
  const baseSlot = slot.startsWith('custom:') ? null : slot;
  const recipes = getAllRecipes()
    .filter(r => !baseSlot || recipeMatchesCategory(r, baseSlot))
    .sort((a, b) => tName(a.name).localeCompare(tName(b.name), 'es', { sensitivity: 'base' }));
  const modal = document.createElement('div');
  modal.className = 'modal-overlay active';
  modal.innerHTML = `
    <div class="modal">
      <h2>${t('selectRecipe')}</h2>
      <input type="text" id="pickerSearch" placeholder="${t('search')}" style="margin-bottom:12px">
      <div id="pickerList" style="max-height:50vh;overflow-y:auto">
        ${recipes.map(r => `
          <div class="card pick-recipe" data-id="${r.id}" style="cursor:pointer">
            <div class="card-title">${tName(r.name)}</div>
            <div class="card-meta">${t(r.category)}</div>
          </div>
        `).join('')}
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary btn-full close-modal">${t('cancel')}</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);

  modal.querySelector('.close-modal').addEventListener('click', () => modal.remove());
  modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });

  // Search filter
  modal.querySelector('#pickerSearch').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    modal.querySelectorAll('.pick-recipe').forEach(card => {
      const name = card.querySelector('.card-title').textContent.toLowerCase();
      card.style.display = name.includes(q) ? '' : 'none';
    });
  });

  // Pick a recipe
  modal.querySelectorAll('.pick-recipe').forEach(card => {
    card.addEventListener('click', () => {
      if (!mealPlan[dateStr]) mealPlan[dateStr] = [];
      const pickedRecipe = getRecipeById(card.dataset.id);
      const defaultServings = pickedRecipe ? pickedRecipe.servings : 1;
      const entry = { slot, recipeId: card.dataset.id, servings: defaultServings };
      if (replaceMealIdx !== undefined) {
        mealPlan[dateStr][replaceMealIdx] = entry;
      } else {
        mealPlan[dateStr].push(entry);
      }
      saveMealPlan();
      addToMealHistory(card.dataset.id, dateStr, slot);
      modal.remove();
      renderMealPlan();
    });
  });
}

// ===== INVENTORY & GROCERY HELPERS =====
const PANTRY_STAPLES = new Set([
  'salt', 'pepper', 'baking powder', 'butter', 'caesar dressing',
  'all-purpose flour', 'cumin', 'oregano', 'maple syrup', 'mayonnaise',
  'ketchup', 'olive oil', 'soy sauce', 'sugar'
]);

function isPantryStaple(name) {
  const en = (typeof name === 'object' ? name.en : name).toLowerCase();
  return PANTRY_STAPLES.has(en);
}

function invKey(item) {
  const nameEn = (typeof item.name === 'object' ? item.name.en : item.name).toLowerCase();
  return nameEn + '|' + item.unit;
}

function getWeekNeededIngredients() {
  const weekDates = getWeekDates();
  const ingredientMap = {};
  weekDates.forEach(d => {
    const meals = mealPlan[dateKey(d)] || [];
    meals.forEach(meal => {
      const recipe = getRecipeById(meal.recipeId);
      if (!recipe) return;
      // Scale the recipe's ingredient amounts by how many portions the user
      // wants for *this meal* (set via the +/- controls on the weekly plan),
      // relative to the recipe's own serving count.
      const mealServings = getMealServings(meal, recipe);
      const scale = recipe.servings > 0 ? (mealServings / recipe.servings) : 1;
      recipe.ingredients.forEach(ing => {
        const nameEn = (typeof ing.name === 'object' ? ing.name.en : ing.name).toLowerCase();
        const key = nameEn + '|' + ing.unit;
        if (!ingredientMap[key]) {
          ingredientMap[key] = { name: ing.name, amount: 0, unit: ing.unit };
        }
        ingredientMap[key].amount += ing.amount * scale;
      });
    });
  });
  return Object.values(ingredientMap)
    .filter(item => !isPantryStaple(item.name))
    .map(item => ({ ...item, amount: +item.amount.toFixed(1) }))
    .sort((a, b) => tName(a.name).localeCompare(tName(b.name)));
}

function getInventoryAmount(name, unit) {
  const key = (typeof name === 'object' ? name.en : name).toLowerCase() + '|' + unit;
  const item = inventoryData.items.find(i => invKey(i) === key);
  return item ? item.amount : 0;
}

function setInventoryAmount(name, unit, amount) {
  const key = (typeof name === 'object' ? name.en : name).toLowerCase() + '|' + unit;
  const existing = inventoryData.items.find(i => invKey(i) === key);
  if (existing) {
    existing.amount = amount;
  } else {
    inventoryData.items.push({ name, amount, unit });
  }
  saveInventory();
}

function renderGroceryList() {
  const container = document.getElementById('tab-grocery');
  const needed = getWeekNeededIngredients();
  const hasManual = groceryData.manualItems && groceryData.manualItems.length > 0;
  const hasNeeded = needed.length > 0;

  container.innerHTML = `
    ${!hasNeeded && !hasManual ? `<div class="empty-state">${t('noItemsYet')}</div>` : ''}
    ${hasNeeded ? `
      <div style="display:grid;grid-template-columns:1fr 55px 55px 55px;gap:4px;padding:6px 0;font-size:11px;font-weight:700;color:#888;text-transform:uppercase;">
        <span></span>
        <span style="text-align:center">Tengo</span>
        <span style="text-align:center">Necesito</span>
        <span style="text-align:center">Comprar</span>
      </div>
      ${needed.map(ing => {
        const onHand = getInventoryAmount(ing.name, ing.unit);
        const toBuy = Math.max(0, +(ing.amount - onHand).toFixed(1));
        const enough = onHand >= ing.amount;
        const skipThreshold = toBuy > 0 && toBuy < ing.amount * 0.1;
        return `<div style="display:grid;grid-template-columns:1fr 55px 55px 55px;gap:4px;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0f0;${enough || skipThreshold ? 'opacity:0.4' : ''}">
          <span style="font-size:14px;${enough || skipThreshold ? 'text-decoration:line-through' : ''}">${tName(ing.name)} <span style="font-size:11px;color:#999">(${ing.unit})</span></span>
          <input type="number" class="inv-input" value="${onHand || ''}" placeholder="0" min="0" step="any"
            data-name='${JSON.stringify(ing.name)}' data-unit="${ing.unit}"
            style="width:55px;text-align:center;padding:5px 2px;border-radius:6px;border:1px solid #ddd;font-size:13px;font-weight:600;${enough ? 'color:#16a34a;background:#f0fdf4' : 'color:#2563eb'}">
          <span style="text-align:center;font-size:13px;color:#888">${ing.amount}</span>
          <span style="text-align:center;font-size:13px;font-weight:700;${enough || skipThreshold ? 'color:#16a34a' : 'color:#dc2626'}">${enough || skipThreshold ? '✓' : toBuy}</span>
        </div>`;
      }).join('')}
    ` : ''}
    ${hasManual ? `
      <div class="section-title">${t('manualItems')}</div>
      ${groceryData.manualItems.map((item, i) => `
        <div class="check-item ${item.checked ? 'checked' : ''}" data-type="manual" data-idx="${i}">
          <input type="checkbox" ${item.checked ? 'checked' : ''}>
          <span class="check-label">${item.name}</span>
        </div>
      `).join('')}
    ` : ''}
    <div style="display:flex;gap:8px;margin-top:16px">
      <input type="text" id="manualItemInput" placeholder="${t('addItem')}">
      <button class="btn btn-primary btn-sm" id="addManualBtn">+</button>
    </div>
    ${hasManual ? `<button class="btn btn-sm btn-secondary" id="clearCheckedBtn" style="margin-top:8px">${t('clearChecked')}</button>` : ''}
  `;

  // Save inventory on input change
  container.querySelectorAll('.inv-input').forEach(el => {
    el.addEventListener('change', () => {
      const name = JSON.parse(el.dataset.name);
      const unit = el.dataset.unit;
      const parsed = parseFloat(el.value) || 0;
      setInventoryAmount(name, unit, parsed);
      renderGroceryList();
    });
  });

  // Check/uncheck manual items
  container.querySelectorAll('.check-item[data-type="manual"]').forEach(item => {
    const checkbox = item.querySelector('input[type="checkbox"]');
    checkbox.addEventListener('change', () => {
      const idx = parseInt(item.dataset.idx);
      groceryData.manualItems[idx].checked = checkbox.checked;
      saveGroceries();
      item.classList.toggle('checked', checkbox.checked);
    });
  });

  // Clear checked manual items
  const clearBtn = document.getElementById('clearCheckedBtn');
  if (clearBtn) {
    clearBtn.addEventListener('click', () => {
      groceryData.manualItems = (groceryData.manualItems || []).filter(i => !i.checked);
      saveGroceries();
      renderGroceryList();
    });
  }

  // Add manual item
  const addManual = () => {
    const input = document.getElementById('manualItemInput');
    const name = input.value.trim();
    if (!name) return;
    if (!groceryData.manualItems) groceryData.manualItems = [];
    groceryData.manualItems.push({ name, checked: false });
    saveGroceries();
    renderGroceryList();
  };
  document.getElementById('addManualBtn').addEventListener('click', addManual);
  document.getElementById('manualItemInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addManual();
  });
}

updateLangUI();

localStorage.setItem('menuapp-view', 'list');
localStorage.removeItem('menuapp-viewing-recipe');
let initTab = localStorage.getItem('menuapp-active-tab') || 'mealplan';
if (initTab === 'inventory') initTab = 'grocery';
switchTab(initTab);
  </script>
