<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Menu App</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      color: #333; background: #fafafa;
      min-height: 100vh; display: flex; flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== TOP BAR ===== */
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; background: #fff; border-bottom: 1px solid #e5e5e5;
      position: sticky; top: 0; z-index: 100;
    }
    .top-bar h1 { font-size: 18px; font-weight: 700; }
    .top-bar-actions { display: flex; gap: 8px; align-items: center; }
    .settings-btn {
      background: none; border: none; font-size: 20px; cursor: pointer; color: #555;
      padding: 4px;
    }

    /* ===== TAB CONTENT ===== */
    .tab-content {
      flex: 1; overflow-y: auto; padding: 16px;
      padding-bottom: 72px; /* space for bottom bar */
      display: none;
    }
    .tab-content.active { display: block; }

    /* ===== BOTTOM TAB BAR ===== */
    .tab-bar {
      display: flex; position: fixed; bottom: 0; left: 0; right: 0;
      background: #fff; border-top: 1px solid #e5e5e5;
      z-index: 100; padding-bottom: env(safe-area-inset-bottom, 0);
    }
    .tab-bar button {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 8px 0; border: none; background: none;
      font-size: 11px; color: #999; cursor: pointer; gap: 2px;
    }
    .tab-bar button .tab-icon { font-size: 22px; }
    .tab-bar button.active { color: #2563eb; }

    /* ===== MODAL OVERLAY ===== */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      z-index: 200; align-items: center; justify-content: center; padding: 16px;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #fff; border-radius: 12px; padding: 24px; width: 100%;
      max-width: 400px; max-height: 90vh; overflow-y: auto;
    }
    .modal h2 { font-size: 18px; margin-bottom: 16px; }
    .modal-actions { display: flex; gap: 8px; margin-top: 16px; }

    /* ===== BUTTONS ===== */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 10px 16px; border-radius: 8px; font-size: 14px;
      font-weight: 600; cursor: pointer; border: none;
    }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:active { background: #1d4ed8; }
    .btn-secondary { background: #f3f4f6; color: #333; }
    .btn-secondary:active { background: #e5e7eb; }
    .btn-danger { background: #fee2e2; color: #dc2626; }
    .btn-danger:active { background: #fecaca; }
    .btn-full { width: 100%; }
    .btn-sm { padding: 6px 12px; font-size: 13px; }

    /* ===== FORM ELEMENTS ===== */
    input[type="text"], input[type="number"], select, textarea {
      width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px;
      font-size: 14px; font-family: inherit; color: #333; background: #fff;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #2563eb; }
    textarea { resize: vertical; min-height: 60px; }

    /* ===== CARDS ===== */
    .card {
      background: #fff; border-radius: 10px; padding: 14px;
      border: 1px solid #e5e5e5; margin-bottom: 10px; cursor: pointer;
    }
    .card:active { background: #f9f9f9; }
    .card-title { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
    .card-meta { font-size: 12px; color: #888; }

    /* ===== CHIPS ===== */
    .chip-row { display: flex; gap: 8px; overflow-x: auto; padding: 8px 0; }
    .chip {
      padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500;
      background: #f3f4f6; color: #555; border: none; cursor: pointer; white-space: nowrap;
    }
    .chip.active { background: #2563eb; color: #fff; }

    /* ===== CHECKLIST ===== */
    .check-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .check-item input[type="checkbox"] {
      width: 20px; height: 20px; accent-color: #2563eb; cursor: pointer;
    }
    .check-item.checked .check-label { text-decoration: line-through; color: #aaa; }
    .check-label { flex: 1; font-size: 14px; }
    .check-amount { font-size: 13px; color: #888; }

    /* ===== FAB ===== */
    .fab {
      position: fixed; bottom: 72px; right: 16px; width: 52px; height: 52px;
      border-radius: 50%; background: #2563eb; color: #fff; border: none;
      font-size: 28px; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      display: flex; align-items: center; justify-content: center; z-index: 50;
    }
    .fab:active { background: #1d4ed8; }

    /* ===== MEAL PLAN ===== */
    .week-row {
      display: flex; flex-direction: column; gap: 8px; padding: 8px 0;
    }
    .day-col {
      background: #fff; border-radius: 10px; border: 1px solid #e5e5e5; padding: 12px;
    }
    .day-col.today { border-color: #2563eb; }
    .day-header {
      font-size: 14px; font-weight: 700;
      margin-bottom: 8px; color: #555;
      display: flex; align-items: center; gap: 8px;
    }
    .day-header.today { color: #2563eb; }
    .day-date { font-size: 12px; color: #999; font-weight: 400; }
    .meal-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .meal-chip {
      font-size: 12px; padding: 6px 10px; background: #f3f4f6; border-radius: 6px;
      position: relative; flex: 1; min-width: 80px;
    }
    .meal-chip .slot-label { font-weight: 600; font-size: 10px; color: #888; text-transform: uppercase; }
    .meal-chip .recipe-name { font-size: 12px; margin-top: 2px; }
    .day-add-btn {
      padding: 6px 12px; border: 1px dashed #ddd; border-radius: 6px;
      background: none; font-size: 18px; color: #ccc; cursor: pointer;
      flex: 0; min-width: 36px;
    }
    .day-add-btn:active { background: #f9f9f9; }

    /* ===== RECIPE DETAIL ===== */
    .detail-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
    .back-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #555; padding: 4px; }
    .servings-control { display: flex; align-items: center; gap: 12px; margin: 12px 0; }
    .servings-control button {
      width: 32px; height: 32px; border-radius: 50%; border: 1px solid #ddd;
      background: #fff; font-size: 18px; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
    }
    .servings-control button:active { background: #f0f0f0; }
    .servings-count { font-size: 16px; font-weight: 600; min-width: 20px; text-align: center; }
    .ingredient-row {
      display: flex; align-items: center; gap: 8px; padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .ingredient-amount {
      min-width: 60px; font-weight: 600; font-size: 14px; color: #2563eb;
      cursor: pointer; padding: 2px 4px; border-radius: 4px;
    }
    .ingredient-amount:hover { background: #eff6ff; }

    /* ===== SETTINGS MODAL ===== */
    .settings-list { list-style: none; }
    .settings-list li {
      padding: 14px 0; border-bottom: 1px solid #f0f0f0;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; font-size: 15px;
    }
    .settings-list li:active { color: #2563eb; }

    /* ===== TOAST ===== */
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: #333; color: #fff; padding: 10px 20px; border-radius: 8px;
      font-size: 14px; z-index: 300; opacity: 0; transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }

    /* ===== CHECKLIST GRID ===== */
    .checklist-grid {
      display: flex; flex-direction: column; gap: 4px;
    }
    .checklist-header {
      display: grid; grid-template-columns: 50px 1fr 1fr 1fr; gap: 6px;
      font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase;
      margin-bottom: 4px; padding: 0 4px;
    }
    .checklist-header span { text-align: center; }
    .checklist-row {
      display: grid; grid-template-columns: 50px 1fr 1fr 1fr; gap: 6px;
      align-items: center; padding: 10px 4px;
      background: #fff; border-radius: 8px; border: 1px solid #e5e5e5;
    }
    .checklist-row .day-label { font-weight: 600; font-size: 13px; }
    .checklist-row .day-label.today { color: #2563eb; }
    .checklist-row .cb-cell { text-align: center; }
    .checklist-row .cb-cell input[type="checkbox"] {
      width: 22px; height: 22px; accent-color: #2563eb; cursor: pointer;
    }

    /* ===== INVENTORY ===== */
    .inv-row {
      display: flex; align-items: center; gap: 8px; padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .inv-name { flex: 1; font-size: 14px; }
    .inv-amount {
      min-width: 60px; text-align: right; font-weight: 600; font-size: 14px;
      color: #2563eb; cursor: pointer; padding: 4px 8px; border-radius: 6px;
      background: #eff6ff;
    }
    .inv-amount.zero { color: #ccc; background: #f9f9f9; }
    .inv-unit { font-size: 12px; color: #888; min-width: 32px; }

    /* ===== UTILITY ===== */
    .section-title { font-size: 14px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin: 16px 0 8px; }
    .empty-state { text-align: center; padding: 40px 16px; color: #999; font-size: 14px; }
    .hidden { display: none !important; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
    .mb-8 { margin-bottom: 8px; }
    .mb-16 { margin-bottom: 16px; }
    .gap-8 { gap: 8px; }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="top-bar">
    <h1>Menu App</h1>
    <div class="top-bar-actions">
      <button class="settings-btn" id="syncBtn" title="Sync">&#9729;</button>
      <button class="settings-btn" id="settingsBtn">&#9881;</button>
    </div>
  </div>

  <!-- TAB: RECIPES -->
  <div class="tab-content active" id="tab-recipes"></div>

  <!-- TAB: MEAL PLAN -->
  <div class="tab-content" id="tab-mealplan"></div>

  <!-- TAB: INVENTORY -->
  <div class="tab-content" id="tab-inventory"></div>

  <!-- TAB: GROCERY LIST -->
  <div class="tab-content" id="tab-grocery"></div>

  <!-- BOTTOM TAB BAR -->
  <div class="tab-bar">
    <button class="active" data-tab="recipes">
      <span class="tab-icon">&#127858;</span>
      <span data-lang="recipes">Recipes</span>
    </button>
    <button data-tab="mealplan">
      <span class="tab-icon">&#128197;</span>
      <span data-lang="mealPlan">Meal Plan</span>
    </button>
    <button data-tab="inventory">
      <span class="tab-icon">&#127968;</span>
      <span data-lang="inventory">Inventory</span>
    </button>
    <button data-tab="grocery">
      <span class="tab-icon">&#128722;</span>
      <span data-lang="groceryList">Grocery List</span>
    </button>
  </div>

  <!-- SETTINGS MODAL -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal">
      <h2 data-lang="settings">Settings</h2>
      <ul class="settings-list">
        <li id="exportBtn"><span data-lang="exportData">Export Data</span> <span>&#8594;</span></li>
        <li id="importBtn"><span data-lang="importData">Import Data</span> <span>&#8594;</span></li>
      </ul>
      <div style="margin-top:16px;border-top:1px solid #f0f0f0;padding-top:16px">
        <label style="font-size:13px;font-weight:600;color:#555" data-lang="githubToken">GitHub Token</label>
        <p style="font-size:12px;color:#999;margin:4px 0 8px" data-lang="tokenHelp">Create a token at GitHub → Settings → Developer Settings → Personal Access Tokens with 'gist' scope.</p>
        <div style="display:flex;gap:8px">
          <input type="password" id="ghTokenInput" placeholder="ghp_..." style="flex:1">
          <button class="btn btn-primary btn-sm" id="saveTokenBtn" data-lang="save">Save</button>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary btn-full" id="settingsClose" data-lang="cancel">Cancel</button>
      </div>
    </div>
  </div>

  <!-- IMPORT CONFIRM MODAL -->
  <div class="modal-overlay" id="importModal">
    <div class="modal">
      <h2 data-lang="importData">Import Data</h2>
      <p data-lang="mergeOrReplace">Merge with existing data or replace?</p>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="importMergeBtn" data-lang="merge">Merge</button>
        <button class="btn btn-danger" id="importReplaceBtn" data-lang="replace">Replace</button>
        <button class="btn btn-secondary" id="importCancelBtn" data-lang="cancel">Cancel</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- HIDDEN FILE INPUT -->
  <input type="file" id="fileInput" accept=".json" class="hidden">

  <script src="lang.js"></script>
  <script src="recipes-data.js"></script>
  <script>
// ===== STATE =====
const STORAGE_KEYS = {
  recipes: 'menuapp-recipes',
  mealplan: 'menuapp-mealplan',
  groceries: 'menuapp-groceries',
  lang: 'menuapp-lang',
  mealHistory: 'menuapp-meal-history',
  checklistPattern: 'menuapp-checklist-pattern',
  inventory: 'menuapp-inventory',
  ghToken: 'menuapp-gh-token',
  gistId: 'menuapp-gist-id',
};

let currentLang = 'es';
let customRecipes = JSON.parse(localStorage.getItem(STORAGE_KEYS.recipes) || '[]');
let mealPlan = JSON.parse(localStorage.getItem(STORAGE_KEYS.mealplan) || '{}');
let groceryData = JSON.parse(localStorage.getItem(STORAGE_KEYS.groceries) || '{"autoItems":[],"manualItems":[]}');
let mealHistory = JSON.parse(localStorage.getItem(STORAGE_KEYS.mealHistory) || '[]');
let checklistPattern = JSON.parse(localStorage.getItem(STORAGE_KEYS.checklistPattern) || 'null');
let inventoryData = JSON.parse(localStorage.getItem(STORAGE_KEYS.inventory) || '{"items":[],"customItems":[]}');

function saveRecipes() { localStorage.setItem(STORAGE_KEYS.recipes, JSON.stringify(customRecipes)); }
function saveMealPlan() { localStorage.setItem(STORAGE_KEYS.mealplan, JSON.stringify(mealPlan)); }
function saveGroceries() { localStorage.setItem(STORAGE_KEYS.groceries, JSON.stringify(groceryData)); }
function saveLang() { localStorage.setItem(STORAGE_KEYS.lang, currentLang); }
function saveMealHistory() { localStorage.setItem(STORAGE_KEYS.mealHistory, JSON.stringify(mealHistory)); }
function saveChecklistPattern() { localStorage.setItem(STORAGE_KEYS.checklistPattern, JSON.stringify(checklistPattern)); }
function saveInventory() { localStorage.setItem(STORAGE_KEYS.inventory, JSON.stringify(inventoryData)); }

function getAllRecipes() {
  const overrideIds = customRecipes.filter(r => r.overrides).map(r => r.overrides);
  const base = STARTER_RECIPES.filter(r => !overrideIds.includes(r.id));
  return [...base, ...customRecipes].filter(r => !r.deleted);
}

function getRecipeById(id) {
  // Check for a custom override of this recipe first
  const override = customRecipes.find(r => r.overrides === id && !r.deleted);
  if (override) return override;
  return customRecipes.find(r => r.id === id && !r.deleted) || STARTER_RECIPES.find(r => r.id === id);
}

// ===== i18n =====
function t(key) {
  return LANG[key] ? (LANG[key][currentLang] || LANG[key].en) : key;
}

function tName(obj) {
  if (!obj) return '';
  const s = typeof obj === 'string' ? obj : (obj[currentLang] || obj.en || '');
  return s.charAt(0).toUpperCase() + s.slice(1);
}

function updateLangUI() {
  document.querySelectorAll('[data-lang]').forEach(el => {
    const key = el.getAttribute('data-lang');
    if (LANG[key]) el.textContent = t(key);
  });
  document.querySelectorAll('[data-lang-placeholder]').forEach(el => {
    const key = el.getAttribute('data-lang-placeholder');
    if (LANG[key]) el.placeholder = t(key);
  });
  document.getElementById('langToggle').textContent = currentLang.toUpperCase();
}

// ===== TAB NAVIGATION =====
const tabButtons = document.querySelectorAll('.tab-bar button');
const tabContents = document.querySelectorAll('.tab-content');

function switchTab(tabName) {
  tabButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tabName));
  tabContents.forEach(tc => tc.classList.toggle('active', tc.id === 'tab-' + tabName));
  // Hide FAB when not on recipes list
  const fab = document.getElementById('recipeFab');
  if (fab) fab.classList.toggle('hidden', tabName !== 'recipes');
  if (tabName === 'recipes') {
    const savedView = localStorage.getItem('menuapp-view');
    const savedRecipeId = localStorage.getItem('menuapp-viewing-recipe');
    if (savedView === 'detail' && savedRecipeId && getRecipeById(savedRecipeId)) {
      renderRecipeDetail(savedRecipeId);
    } else if (savedView === 'form' && savedRecipeId && getRecipeById(savedRecipeId)) {
      openRecipeForm(getRecipeById(savedRecipeId));
    } else {
      renderRecipesList();
    }
  }
  if (tabName === 'mealplan') renderMealPlan();
  if (tabName === 'inventory') renderInventory();
  if (tabName === 'grocery') renderGroceryList();
  localStorage.setItem('menuapp-active-tab', tabName);
}

tabButtons.forEach(btn => btn.addEventListener('click', () => {
  if (btn.dataset.tab === 'recipes') {
    localStorage.setItem('menuapp-view', 'list');
    localStorage.removeItem('menuapp-viewing-recipe');
  }
  switchTab(btn.dataset.tab);
}));

// ===== SETTINGS MODAL =====
const settingsModal = document.getElementById('settingsModal');
document.getElementById('settingsBtn').addEventListener('click', () => {
  const saved = localStorage.getItem(STORAGE_KEYS.ghToken) || '';
  document.getElementById('ghTokenInput').value = saved;
  settingsModal.classList.add('active');
});
document.getElementById('settingsClose').addEventListener('click', () => settingsModal.classList.remove('active'));
settingsModal.addEventListener('click', (e) => { if (e.target === settingsModal) settingsModal.classList.remove('active'); });

// ===== TOAST =====
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// ===== EXPORT =====
document.getElementById('exportBtn').addEventListener('click', () => {
  const data = { customRecipes, mealPlan, groceryData, inventoryData, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'menu-app-data.json'; a.click();
  URL.revokeObjectURL(url);
  showToast(t('exportSuccess'));
  settingsModal.classList.remove('active');
});

// ===== IMPORT =====
const importModal = document.getElementById('importModal');
const fileInput = document.getElementById('fileInput');
let pendingImportData = null;

document.getElementById('importBtn').addEventListener('click', () => {
  settingsModal.classList.remove('active');
  fileInput.click();
});

fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      pendingImportData = JSON.parse(ev.target.result);
      importModal.classList.add('active');
    } catch { showToast('Invalid JSON file'); }
  };
  reader.readAsText(file);
  fileInput.value = '';
});

function applyImport(mode) {
  if (!pendingImportData) return;
  if (mode === 'replace') {
    customRecipes = pendingImportData.customRecipes || [];
    mealPlan = pendingImportData.mealPlan || {};
    groceryData = pendingImportData.groceryData || { autoItems: [], manualItems: [] };
    inventoryData = pendingImportData.inventoryData || { items: [], customItems: [] };
  } else {
    // Merge: add new custom recipes (by id), merge meal plan days, append manual grocery items
    const existingIds = new Set(customRecipes.map(r => r.id));
    (pendingImportData.customRecipes || []).forEach(r => {
      if (!existingIds.has(r.id)) customRecipes.push(r);
      else {
        const idx = customRecipes.findIndex(e => e.id === r.id);
        customRecipes[idx] = r;
      }
    });
    Object.assign(mealPlan, pendingImportData.mealPlan || {});
    const importManual = pendingImportData.groceryData?.manualItems || [];
    groceryData.manualItems = [...groceryData.manualItems, ...importManual];
    // Merge inventory: update amounts for existing items, add new ones
    if (pendingImportData.inventoryData) {
      const existingKeys = new Set(inventoryData.items.map(i => invKey(i)));
      (pendingImportData.inventoryData.items || []).forEach(item => {
        const k = invKey(item);
        if (existingKeys.has(k)) {
          const existing = inventoryData.items.find(i => invKey(i) === k);
          if (existing) existing.amount = item.amount;
        } else {
          inventoryData.items.push(item);
        }
      });
      const existingCustom = new Set(inventoryData.customItems.map(i => invKey(i)));
      (pendingImportData.inventoryData.customItems || []).forEach(item => {
        if (!existingCustom.has(invKey(item))) inventoryData.customItems.push(item);
      });
    }
  }
  saveRecipes(); saveMealPlan(); saveGroceries(); saveInventory();
  pendingImportData = null;
  importModal.classList.remove('active');
  showToast(t('importSuccess'));
  const activeTab = document.querySelector('.tab-bar button.active').dataset.tab;
  switchTab(activeTab);
}

document.getElementById('importMergeBtn').addEventListener('click', () => applyImport('merge'));
document.getElementById('importReplaceBtn').addEventListener('click', () => applyImport('replace'));
document.getElementById('importCancelBtn').addEventListener('click', () => { pendingImportData = null; importModal.classList.remove('active'); });
importModal.addEventListener('click', (e) => { if (e.target === importModal) { pendingImportData = null; importModal.classList.remove('active'); } });

// ===== GITHUB GIST SYNC =====
document.getElementById('saveTokenBtn').addEventListener('click', () => {
  const token = document.getElementById('ghTokenInput').value.trim();
  if (!token) return;
  localStorage.setItem(STORAGE_KEYS.ghToken, token);
  showToast(t('tokenSaved'));
});

document.getElementById('syncBtn').addEventListener('click', () => {
  const token = localStorage.getItem(STORAGE_KEYS.ghToken);
  if (!token) {
    showToast(t('syncNoToken'));
    settingsModal.classList.add('active');
    return;
  }
  showSyncModal();
});

function showSyncModal() {
  const modal = document.createElement('div');
  modal.className = 'modal-overlay active';
  modal.innerHTML = `
    <div class="modal">
      <h2>${t('sync')}</h2>
      <p style="margin-bottom:16px">${t('syncDirection')}</p>
      <div style="display:flex;flex-direction:column;gap:8px">
        <button class="btn btn-primary btn-full" id="syncUpBtn">${t('syncUpload')}</button>
        <button class="btn btn-secondary btn-full" id="syncDownBtn">${t('syncDownload')}</button>
        <button class="btn btn-secondary btn-full" id="syncCancelBtn">${t('cancel')}</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
  modal.querySelector('#syncCancelBtn').addEventListener('click', () => modal.remove());
  modal.querySelector('#syncUpBtn').addEventListener('click', async () => {
    modal.remove();
    await syncUpload();
  });
  modal.querySelector('#syncDownBtn').addEventListener('click', async () => {
    modal.remove();
    await syncDownload();
  });
}

function getSyncData() {
  return {
    customRecipes, mealPlan, groceryData, inventoryData, mealHistory, checklistPattern,
    lang: currentLang,
    activeTab: localStorage.getItem('menuapp-active-tab') || 'recipes',
    syncedAt: new Date().toISOString()
  };
}

function applySyncData(data) {
  customRecipes = data.customRecipes || [];
  mealPlan = data.mealPlan || {};
  groceryData = data.groceryData || { autoItems: [], manualItems: [] };
  inventoryData = data.inventoryData || { items: [], customItems: [] };
  mealHistory = data.mealHistory || [];
  checklistPattern = data.checklistPattern || null;
  if (data.lang) { currentLang = data.lang; saveLang(); }
  saveRecipes(); saveMealPlan(); saveGroceries(); saveInventory(); saveMealHistory(); saveChecklistPattern();
  updateLangUI();
  switchTab(data.activeTab || 'recipes');
}

async function syncUpload() {
  const token = localStorage.getItem(STORAGE_KEYS.ghToken);
  const gistId = localStorage.getItem(STORAGE_KEYS.gistId);
  const payload = { files: { 'menu-app-data.json': { content: JSON.stringify(getSyncData(), null, 2) } } };

  try {
    let res;
    if (gistId) {
      res = await fetch('https://api.github.com/gists/' + gistId, {
        method: 'PATCH',
        headers: { 'Authorization': 'token ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
    } else {
      payload.description = 'Menu App Sync Data';
      payload.public = false;
      res = await fetch('https://api.github.com/gists', {
        method: 'POST',
        headers: { 'Authorization': 'token ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
    }
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    localStorage.setItem(STORAGE_KEYS.gistId, data.id);
    showToast(t('syncSuccess'));
  } catch (e) {
    showToast(t('syncError'));
  }
}

async function syncDownload() {
  const token = localStorage.getItem(STORAGE_KEYS.ghToken);
  let gistId = localStorage.getItem(STORAGE_KEYS.gistId);

  try {
    // If no gist ID stored locally, find it by searching user's gists
    if (!gistId) {
      const listRes = await fetch('https://api.github.com/gists', {
        headers: { 'Authorization': 'token ' + token }
      });
      if (!listRes.ok) throw new Error(listRes.status);
      const gists = await listRes.json();
      const found = gists.find(g => g.files['menu-app-data.json']);
      if (!found) throw new Error('No Menu App gist found');
      gistId = found.id;
      localStorage.setItem(STORAGE_KEYS.gistId, gistId);
    }

    const res = await fetch('https://api.github.com/gists/' + gistId, {
      headers: { 'Authorization': 'token ' + token }
    });
    if (!res.ok) throw new Error(res.status);
    const gist = await res.json();
    const content = gist.files['menu-app-data.json']?.content;
    if (!content) throw new Error('No data file in gist');
    const data = JSON.parse(content);
    applySyncData(data);
    showToast(t('syncSuccess'));
  } catch (e) {
    showToast(t('syncError'));
  }
}

function renderRecipeDetail(recipeId) {
  currentView = 'detail';
  viewingRecipeId = recipeId;
  localStorage.setItem('menuapp-view', 'detail');
  localStorage.setItem('menuapp-viewing-recipe', recipeId);
  const recipe = getRecipeById(recipeId);
  if (!recipe) return renderRecipesList();

  const baseRecipe = recipe.overrides
    ? (STARTER_RECIPES.find(r => r.id === recipe.overrides) || recipe)
    : recipe;
  const scaleFactor = recipe.servings / baseRecipe.servings;

  const container = document.getElementById('tab-recipes');
  const fab = document.getElementById('recipeFab');
  if (fab) fab.classList.add('hidden');

  const isOverride = !!recipe.overrides;
  const isCustom = recipe.isCustom && !recipe.overrides;

  container.innerHTML = `
    <div class="detail-header">
      <button class="back-btn" id="backToList">&#8592;</button>
      <div>
        <button class="btn btn-sm btn-secondary" id="editRecipeBtn" data-t="editRecipe">${t('editRecipe')}</button>

    <h2 data-tname='${JSON.stringify(recipe.name)}'>${tName(recipe.name)}</h2>
    <div class="servings-control">
      <span style="font-weight:600"><span data-t="servings">${t('servings')}</span>:</span>
      <button id="servMinus">&#8722;</button>
      <span class="servings-count" id="servCount">${recipe.servings}</span>
      <button id="servPlus">+</button>
    </div>
    <button class="btn btn-primary btn-full hidden" id="saveServingsBtn" style="margin-bottom:12px" data-t="save">${t('save')}</button>
    <div class="section-title" data-t="ingredients">${t('ingredients')}</div>
    <div id="ingredientsList">
      ${recipe.ingredients.map((ing, i) => {
        const displayAmount = +(ing.amount * scaleFactor).toFixed(1);
        return `<div class="ingredient-row">
          <span class="ingredient-amount" data-idx="${i}" title="Click to edit">${displayAmount} ${ing.unit}</span>
          <span data-tname='${JSON.stringify(ing.name)}'>${tName(ing.name)}</span>
        </div>`;
      }).join('')}
    </div>
  `;

  // Back button
  document.getElementById('backToList').addEventListener('click', renderRecipesList);

  // Servings +/-
  let currentServings = recipe.servings;
  const saveServBtn = document.getElementById('saveServingsBtn');

  function onServingsChange() {
    updateServingsDisplay(recipe, baseRecipe, currentServings);
    saveServBtn.classList.toggle('hidden', currentServings === recipe.servings);
  }

  document.getElementById('servMinus').addEventListener('click', () => {
    if (currentServings <= 1) return;
    currentServings--;
    onServingsChange();
  });
  document.getElementById('servPlus').addEventListener('click', () => {
    currentServings++;
    onServingsChange();
  });

  saveServBtn.addEventListener('click', () => {
    const scale = currentServings / baseRecipe.servings;
    let target;
    if (recipe.isCustom) {
      target = recipe;
    } else {
      target = JSON.parse(JSON.stringify(recipe));
      target.isCustom = true;
      target.overrides = recipe.id;
      target.id = recipe.id + '-custom';
      // Remove old override if exists
      customRecipes = customRecipes.filter(r => r.id !== target.id);
      customRecipes.push(target);
    }
    target.servings = currentServings;
    target.ingredients = baseRecipe.ingredients.map(ing => ({
      ...ing, name: { ...ing.name }, amount: +(ing.amount * scale).toFixed(2)
    }));
    saveRecipes();
    renderRecipeDetail(target.id);
  });

  // Click ingredient amount to edit
  container.querySelectorAll('.ingredient-amount').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.idx);
      const ing = recipe.ingredients[idx];
      const currentAmount = +(ing.amount * (currentServings / baseRecipe.servings)).toFixed(1);
      const newVal = prompt(`${tName(ing.name)} — ${t('amount')}:`, currentAmount);
      if (newVal === null || isNaN(parseFloat(newVal))) return;
      // Save as override: scale back to base servings
      const baseAmount = parseFloat(newVal) / (currentServings / baseRecipe.servings);
      saveIngredientEdit(recipe, idx, baseAmount);
    });
  });

  // Delete recipe (custom or starter)
  document.getElementById('deleteRecipeBtn').addEventListener('click', () => {
    if (!confirm(t('confirmDelete'))) return;
    if (recipe.isCustom) {
      customRecipes = customRecipes.filter(r => r.id !== recipe.id);
    } else {
      // Hide starter recipe by adding a deleted marker
      customRecipes.push({ id: recipe.id + '-deleted', overrides: recipe.id, deleted: true, isCustom: true });
    }
    saveRecipes();
    renderRecipesList();
  });

  // Edit custom recipe
  document.getElementById('editRecipeBtn').addEventListener('click', () => {
    // For starter recipes, create an editable copy
    if (!recipe.isCustom) {
      const copy = JSON.parse(JSON.stringify(recipe));
      copy.isCustom = true;
      copy.overrides = recipe.id;
      copy.id = recipe.id + '-custom';
      customRecipes = customRecipes.filter(r => r.id !== copy.id);
      customRecipes.push(copy);
      saveRecipes();
      openRecipeForm(copy);
    } else {
      openRecipeForm(recipe);
    }
  });

function updateServingsDisplay(recipe, baseRecipe, newServings) {
  document.getElementById('servCount').textContent = newServings;
  const scale = newServings / baseRecipe.servings;
  document.querySelectorAll('.ingredient-amount').forEach(el => {
    const idx = parseInt(el.dataset.idx);
    const ing = recipe.ingredients[idx];
    const displayAmount = +(ing.amount * scale).toFixed(1);
    el.textContent = `${displayAmount} ${ing.unit}`;
  });
}

function saveIngredientEdit(recipe, ingredientIdx, newBaseAmount) {
  let target;
  if (recipe.isCustom) {
    target = recipe;
  } else {
    // Create an override copy
    target = JSON.parse(JSON.stringify(recipe));
    target.isCustom = true;
    target.overrides = recipe.id;
    target.id = recipe.id + '-custom';
    customRecipes.push(target);
  }
  target.ingredients[ingredientIdx].amount = newBaseAmount;
  saveRecipes();
  renderRecipeDetail(target.id);
}

function getWeekDates() {
  const today = new Date();
  const day = today.getDay(); // 0=Sun
  const monday = new Date(today);
  monday.setDate(today.getDate() - ((day + 6) % 7));
  const dates = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    dates.push(d);
  }
  return dates;
}

function dateKey(d) {
  return d.toISOString().split('T')[0];
}

// ===== CHECKLIST VIEW & GENERATION =====
const DAY_NAMES = ['mon','tue','wed','thu','fri','sat','sun'];
const MEAL_SLOTS = ['breakfast','lunch','dinner'];

function renderChecklistView() {
  const container = document.getElementById('tab-mealplan');
  const weekDates = getWeekDates();
  const todayKey = dateKey(new Date());

  // Load pattern or default to all unchecked
  const pattern = checklistPattern || {};

  container.innerHTML = `
    <div style="font-size:18px;font-weight:700;margin-bottom:12px">${t('generatePlan')}</div>
    <div class="checklist-header">
      <span></span>
      <span>${t('brkfst')}</span>
      <span>${t('lunchShort')}</span>
      <span>${t('dinnerShort')}</span>
    </div>
    <div class="checklist-grid">
      ${weekDates.map((d, i) => {
        const dn = DAY_NAMES[i];
        const isToday = dateKey(d) === todayKey;
        const dp = pattern[dn] || {};
        return `<div class="checklist-row">
          <div class="day-label ${isToday ? 'today' : ''}">${t(dn)}</div>
          ${MEAL_SLOTS.map(slot => `
            <div class="cb-cell">
              <input type="checkbox" data-day="${dn}" data-slot="${slot}"
                ${dp[slot] ? 'checked' : ''}>
            </div>
          `).join('')}
        </div>`;
      }).join('')}
    </div>
    <button class="btn btn-primary btn-full" id="generateBtn" style="margin-top:16px">${t('generate')}</button>
    ${weekHasMeals() ? `<button class="btn btn-secondary btn-full" id="backToWeekBtn" style="margin-top:8px">${t('cancel')}</button>` : ''}
  `;

  // Save pattern on each checkbox change
  container.querySelectorAll('.checklist-grid input[type="checkbox"]').forEach(cb => {
    cb.addEventListener('change', () => {
      if (!checklistPattern) checklistPattern = {};
      const dn = cb.dataset.day;
      const slot = cb.dataset.slot;
      if (!checklistPattern[dn]) checklistPattern[dn] = {};
      checklistPattern[dn][slot] = cb.checked;
      saveChecklistPattern();
    });
  });

  // Generate button
  document.getElementById('generateBtn').addEventListener('click', () => {
    const selections = collectChecklistSelections();
    if (selections.length === 0) { showToast('Check at least one meal'); return; }

    if (weekHasMeals()) {
      showReplaceOrFillModal(selections);
    } else {
      runGeneration(selections, 'replace');
    }
  });

  // Back to weekly view button
  const backBtn = document.getElementById('backToWeekBtn');
  if (backBtn) backBtn.addEventListener('click', renderMealPlan);
}

function collectChecklistSelections() {
  const selections = [];
  const weekDates = getWeekDates();
  document.querySelectorAll('.checklist-grid input[type="checkbox"]:checked').forEach(cb => {
    const dayIdx = DAY_NAMES.indexOf(cb.dataset.day);
    selections.push({
      date: dateKey(weekDates[dayIdx]),
      dayName: cb.dataset.day,
      slot: cb.dataset.slot
    });
  });
  return selections;
}

function weekHasMeals() {
  const weekDates = getWeekDates();
  return weekDates.some(d => (mealPlan[dateKey(d)] || []).length > 0);
}

function showReplaceOrFillModal(selections) {
  const modal = document.createElement('div');
  modal.className = 'modal-overlay active';
  modal.innerHTML = `
    <div class="modal">
      <h2>${t('generatePlan')}</h2>
      <p>${t('replaceOrFill')}</p>
      <div class="modal-actions" style="flex-direction:column">
        <button class="btn btn-danger btn-full" id="genReplaceBtn">${t('replaceAll')}</button>
        <button class="btn btn-primary btn-full" id="genFillBtn">${t('fillEmpty')}</button>
        <button class="btn btn-secondary btn-full" id="genCancelBtn">${t('cancel')}</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
  modal.querySelector('#genCancelBtn').addEventListener('click', () => modal.remove());
  modal.querySelector('#genReplaceBtn').addEventListener('click', () => {
    modal.remove();
    runGeneration(selections, 'replace');
  });
  modal.querySelector('#genFillBtn').addEventListener('click', () => {
    modal.remove();
    runGeneration(selections, 'fill');
  });
}

function runGeneration(selections, mode) {
  const weekDates = getWeekDates();

  if (mode === 'replace') {
    weekDates.forEach(d => delete mealPlan[dateKey(d)]);
  }

  // Filter out slots that already have a meal in fill mode
  let slotsToFill = selections;
  if (mode === 'fill') {
    slotsToFill = selections.filter(sel => {
      const existing = mealPlan[sel.date] || [];
      return !existing.some(m => m.slot === sel.slot);
    });
  }

  // Group by category to process most-constrained first
  const allRecipes = getAllRecipes();
  const byCategory = {};
  MEAL_SLOTS.forEach(slot => {
    byCategory[slot] = allRecipes.filter(r => r.category === slot);
  });

  // Check for empty categories
  const missingCategories = MEAL_SLOTS.filter(slot =>
    slotsToFill.some(s => s.slot === slot) && byCategory[slot].length === 0
  );
  if (missingCategories.length > 0) {
    const names = missingCategories.map(c => t(c)).join(', ');
    showToast(t('noRecipesInCategory') + names);
    slotsToFill = slotsToFill.filter(s => !missingCategories.includes(s.slot));
  }

  if (slotsToFill.length === 0) { renderMealPlan(); return; }

  // Sort by most constrained (fewest recipes in category first)
  slotsToFill.sort((a, b) => byCategory[a.slot].length - byCategory[b.slot].length);

  const assigned = []; // track { recipeId, date, slot } for within-week uniqueness

  slotsToFill.forEach(sel => {
    const candidates = byCategory[sel.slot];
    if (candidates.length === 0) return;

    const scored = scoreRecipes(candidates, sel.date, sel.dayName, assigned);
    const pick = scored[0];

    if (!mealPlan[sel.date]) mealPlan[sel.date] = [];
    mealPlan[sel.date].push({ slot: sel.slot, recipeId: pick.id });
    assigned.push({ recipeId: pick.id, date: sel.date, slot: sel.slot });
    mealHistory.push({ recipeId: pick.id, date: sel.date, slot: sel.slot });
  });

  saveMealPlan();
  saveMealHistory();
  renderMealPlan();
}

function scoreRecipes(candidates, dateStr, dayName, alreadyAssigned) {
  const today = new Date();
  const todayMs = today.getTime();

  const scored = candidates.map(recipe => {
    let score = 0;

    // 1. Recency score: days since last used (higher = better)
    const lastUse = [...mealHistory].reverse().find(h => h.recipeId === recipe.id);
    if (lastUse) {
      const lastDate = new Date(lastUse.date);
      const daysSince = Math.max(1, Math.floor((todayMs - lastDate.getTime()) / 86400000));
      score += daysSince;
    } else {
      score += 9999; // never used = max score
    }

    // 2. Same-weekday penalty
    const sameWeekdayUses = mealHistory.filter(h =>
      h.recipeId === recipe.id && getDayNameFromDate(h.date) === dayName
    );
    sameWeekdayUses.forEach(use => {
      const useDate = new Date(use.date);
      const weeksSince = Math.max(1, Math.floor((todayMs - useDate.getTime()) / (7 * 86400000)));
      score -= 50 / weeksSince;
    });

    // 3. Within-week uniqueness penalty
    const usedThisWeek = alreadyAssigned.filter(a => a.recipeId === recipe.id).length;
    score -= usedThisWeek * 500;

    // Random tiebreaker
    score += Math.random() * 0.5;

    return { ...recipe, _score: score };
  });

  scored.sort((a, b) => b._score - a._score);
  return scored;
}

function getDayNameFromDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const dayIdx = (d.getDay() + 6) % 7; // 0=Mon
  return DAY_NAMES[dayIdx];
}

function addToMealHistory(recipeId, date, slot) {
  mealHistory.push({ recipeId, date, slot });
  saveMealHistory();
}

// ===== MEAL PLAN WEEKLY VIEW =====
function renderMealPlan() {
  // If no meals this week, show checklist instead
  if (!weekHasMeals()) {
    renderChecklistView();
    return;
  }

  const container = document.getElementById('tab-mealplan');
  const weekDates = getWeekDates();
  const dayNames = DAY_NAMES;
  const todayKey = dateKey(new Date());

  container.innerHTML = `
    <div class="flex-between mb-8">
      <div class="section-title" style="margin:0">${t('mealPlan')}</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-sm btn-primary" id="newPlanBtn">${t('newPlan')}</button>
        <button class="btn btn-sm btn-danger" id="clearWeekBtn">${t('clearWeek')}</button>
      </div>
    </div>
    <div class="week-row">
      ${weekDates.map((d, i) => {
        const key = dateKey(d);
        const isToday = key === todayKey;
        const meals = mealPlan[key] || [];
        const slotOrder = ['breakfast','lunch','dinner'];
        const sorted = [...meals].sort((a, b) => {
          const ai = slotOrder.indexOf(a.slot) >= 0 ? slotOrder.indexOf(a.slot) : 99;
          const bi = slotOrder.indexOf(b.slot) >= 0 ? slotOrder.indexOf(b.slot) : 99;
          return ai - bi;
        });
        return `<div class="day-col ${isToday ? 'today' : ''}">
          <div class="day-header ${isToday ? 'today' : ''}">
            ${t(dayNames[i])}
            <span class="day-date">${d.getDate()}/${d.getMonth()+1}</span>
          </div>
          <div class="meal-chips">
            ${sorted.map((meal, mi) => {
              const recipe = getRecipeById(meal.recipeId);
              const slotLabel = meal.slot.startsWith('custom:') ? meal.slot.slice(7) : t(meal.slot);
              return `<div class="meal-chip" data-date="${key}" data-meal-idx="${mi}" data-recipe-id="${meal.recipeId}">
                <div class="slot-label">${slotLabel}</div>
                <div class="recipe-name">${recipe ? tName(recipe.name) : '?'}</div>
              </div>`;
            }).join('')}
            <button class="day-add-btn" data-date="${key}">+</button>
          </div>
        </div>`;
      }).join('')}
    </div>
  `;

  // New Plan button
  document.getElementById('newPlanBtn').addEventListener('click', renderChecklistView);

  // Clear week
  document.getElementById('clearWeekBtn').addEventListener('click', () => {
    if (!confirm(t('confirmClearWeek'))) return;
    weekDates.forEach(d => delete mealPlan[dateKey(d)]);
    saveMealPlan();
    renderMealPlan();
  });

  // Add meal buttons
  container.querySelectorAll('.day-add-btn').forEach(btn => {
    btn.addEventListener('click', () => openAddMealFlow(btn.dataset.date));
  });

  // Remove meal on click
  container.querySelectorAll('.meal-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const key = chip.dataset.date;
      const slotLabel = chip.querySelector('.slot-label').textContent;
      const recipeName = chip.querySelector('.recipe-name').textContent;
      if (!confirm(t('removeMeal') + '?')) return;
      const meals = mealPlan[key] || [];
      // Find the meal by matching slot and recipe name rather than by sorted index
      const recipeId = chip.dataset.recipeId;
      const mealIdx = meals.findIndex(m => m.recipeId === recipeId &&
        (m.slot.startsWith('custom:') ? m.slot.slice(7) : t(m.slot)) === slotLabel);
      if (mealIdx >= 0) meals.splice(mealIdx, 1);
      if (meals.length === 0) delete mealPlan[key];
      else mealPlan[key] = meals;
      saveMealPlan();
      renderMealPlan();
    });
  });
}

function openAddMealFlow(dateStr) {
  const modal = document.createElement('div');
  modal.className = 'modal-overlay active';
  modal.innerHTML = `
    <div class="modal">
      <h2>${t('selectSlot')}</h2>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${['breakfast','lunch','dinner'].map(slot =>
          `<button class="btn btn-secondary btn-full slot-pick" data-slot="${slot}">${t(slot)}</button>`
        ).join('')}
        <button class="btn btn-secondary btn-full slot-pick" data-slot="custom">${t('customSlot')}</button>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary btn-full close-modal">${t('cancel')}</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);

  modal.querySelector('.close-modal').addEventListener('click', () => modal.remove());
  modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });

  modal.querySelectorAll('.slot-pick').forEach(btn => {
    btn.addEventListener('click', () => {
      const slot = btn.dataset.slot;
      if (slot === 'custom') {
        const name = prompt(t('customSlotName'));
        if (!name) return;
        modal.remove();
        openRecipePicker(dateStr, 'custom:' + name);
      } else {
        modal.remove();
        openRecipePicker(dateStr, slot);
      }
    });
  });
}

function openRecipePicker(dateStr, slot) {
  const recipes = getAllRecipes();
  const modal = document.createElement('div');
  modal.className = 'modal-overlay active';
  modal.innerHTML = `
    <div class="modal">
      <h2>${t('selectRecipe')}</h2>
      <input type="text" id="pickerSearch" placeholder="${t('search')}" style="margin-bottom:12px">
      <div id="pickerList" style="max-height:50vh;overflow-y:auto">
        ${recipes.map(r => `
          <div class="card pick-recipe" data-id="${r.id}" style="cursor:pointer">
            <div class="card-title">${tName(r.name)}</div>
            <div class="card-meta">${t(r.category)}</div>
          </div>
        `).join('')}
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary btn-full close-modal">${t('cancel')}</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);

  modal.querySelector('.close-modal').addEventListener('click', () => modal.remove());
  modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });

  // Search filter
  modal.querySelector('#pickerSearch').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    modal.querySelectorAll('.pick-recipe').forEach(card => {
      const name = card.querySelector('.card-title').textContent.toLowerCase();
      card.style.display = name.includes(q) ? '' : 'none';
    });
  });

  // Pick a recipe
  modal.querySelectorAll('.pick-recipe').forEach(card => {
    card.addEventListener('click', () => {
      if (!mealPlan[dateStr]) mealPlan[dateStr] = [];
      mealPlan[dateStr].push({ slot, recipeId: card.dataset.id });
      saveMealPlan();
      addToMealHistory(card.dataset.id, dateStr, slot);
      modal.remove();
      renderMealPlan();
    });
  });
}

// ===== INVENTORY & GROCERY HELPERS =====
const PANTRY_STAPLES = new Set([
  'salt', 'pepper', 'baking powder', 'butter', 'caesar dressing',
  'all-purpose flour', 'cumin', 'oregano', 'maple syrup', 'mayonnaise',
  'ketchup', 'olive oil', 'soy sauce', 'sugar'
]);

function isPantryStaple(name) {
  const en = (typeof name === 'object' ? name.en : name).toLowerCase();
  return PANTRY_STAPLES.has(en);
}

function invKey(item) {
  const nameEn = (typeof item.name === 'object' ? item.name.en : item.name).toLowerCase();
  return nameEn + '|' + item.unit;
}

function getWeekNeededIngredients() {
  const weekDates = getWeekDates();
  const ingredientMap = {};
  weekDates.forEach(d => {
    const meals = mealPlan[dateKey(d)] || [];
    meals.forEach(meal => {
      const recipe = getRecipeById(meal.recipeId);
      if (!recipe) return;
      recipe.ingredients.forEach(ing => {
        const nameEn = (typeof ing.name === 'object' ? ing.name.en : ing.name).toLowerCase();
        const key = nameEn + '|' + ing.unit;
        if (!ingredientMap[key]) {
          ingredientMap[key] = { name: ing.name, amount: 0, unit: ing.unit };
        }
        ingredientMap[key].amount += ing.amount;
      });
    });
  });
  return Object.values(ingredientMap)
    .filter(item => !isPantryStaple(item.name))
    .map(item => ({ ...item, amount: +item.amount.toFixed(1) }))
    .sort((a, b) => tName(a.name).localeCompare(tName(b.name)));
}

function getInventoryAmount(name, unit) {
  const key = (typeof name === 'object' ? name.en : name).toLowerCase() + '|' + unit;
  const item = inventoryData.items.find(i => invKey(i) === key);
  return item ? item.amount : 0;
}

function setInventoryAmount(name, unit, amount) {
  const key = (typeof name === 'object' ? name.en : name).toLowerCase() + '|' + unit;
  const existing = inventoryData.items.find(i => invKey(i) === key);
  if (existing) {
    existing.amount = amount;
  } else {
    inventoryData.items.push({ name, amount, unit });
  }
  saveInventory();
}

// ===== INVENTORY TAB =====
function renderInventory() {
  const container = document.getElementById('tab-inventory');
  const needed = getWeekNeededIngredients();

  container.innerHTML = `
    ${needed.length === 0 ? `<div class="empty-state">${t('inventoryEmpty')}</div>` :
      needed.map((ing, i) => {
        const onHand = getInventoryAmount(ing.name, ing.unit);
        const enough = onHand >= ing.amount;
        return `<div class="inv-row">
          <span class="inv-name">${tName(ing.name)}</span>
          <input type="number" class="inv-input" value="${onHand || ''}" placeholder="" min="0" step="any"
            data-name='${JSON.stringify(ing.name)}' data-unit="${ing.unit}"
            style="width:60px;text-align:right;padding:6px 8px;border-radius:6px;border:1px solid #ddd;font-size:14px;font-weight:600;${enough ? 'color:#16a34a;background:#f0fdf4' : 'color:#2563eb'}">
          <span class="inv-unit" style="min-width:70px">${ing.unit} <span style="color:#bbb;font-size:11px">/ ${ing.amount}</span></span>
        </div>`;
      }).join('')}
  `;

  // Save on input change
  container.querySelectorAll('.inv-input').forEach(el => {
    el.addEventListener('change', () => {
      const name = JSON.parse(el.dataset.name);
      const unit = el.dataset.unit;
      const parsed = parseFloat(el.value) || 0;
      setInventoryAmount(name, unit, parsed);
      // Update styling
      const needed = getWeekNeededIngredients();
      const match = needed.find(n => invKey(n) === invKey({ name, unit }));
      const enough = match && parsed >= match.amount;
      el.style.color = enough ? '#16a34a' : '#2563eb';
      el.style.background = enough ? '#f0fdf4' : '';
      // Auto-update grocery list if visible
      if (document.getElementById('tab-grocery').classList.contains('active')) renderGroceryList();
    });
  });
}

function renderGroceryList() {
  const container = document.getElementById('tab-grocery');

  // Auto-compute grocery items from meal plan minus inventory
  const needed = getWeekNeededIngredients();
  const autoItems = needed.map(item => {
    const onHand = getInventoryAmount(item.name, item.unit);
    const remaining = item.amount - onHand;
    if (remaining <= 0 || remaining < item.amount * 0.1) return null;
    return { name: item.name, amount: +remaining.toFixed(1), unit: item.unit };
  }).filter(Boolean);

  const hasManual = groceryData.manualItems && groceryData.manualItems.length > 0;
  const hasItems = autoItems.length > 0 || hasManual;

  container.innerHTML = `
    ${!hasItems ? `<div class="empty-state">${t('noItemsYet')}</div>` : ''}
    ${autoItems.length > 0 ? `
      <div class="section-title">${t('autoGenerated')}</div>
      ${autoItems.map((item, i) => `
        <div class="check-item" data-type="auto" data-idx="${i}">
          <span class="check-label">${typeof item.name === 'object' ? tName(item.name) : item.name}</span>
          <span class="check-amount">${item.amount} ${item.unit}</span>
        </div>
      `).join('')}
    ` : ''}
    ${hasManual ? `
      <div class="section-title">${t('manualItems')}</div>
      ${groceryData.manualItems.map((item, i) => `
        <div class="check-item ${item.checked ? 'checked' : ''}" data-type="manual" data-idx="${i}">
          <input type="checkbox" ${item.checked ? 'checked' : ''}>
          <span class="check-label">${item.name}</span>
        </div>
      `).join('')}
    ` : ''}
    <div style="display:flex;gap:8px;margin-top:16px">
      <input type="text" id="manualItemInput" data-lang-placeholder="addItem" placeholder="${t('addItem')}">
      <button class="btn btn-primary btn-sm" id="addManualBtn">+</button>
    </div>
    ${hasManual ? `<button class="btn btn-sm btn-secondary" id="clearCheckedBtn" style="margin-top:8px">${t('clearChecked')}</button>` : ''}
  `;

  // Check/uncheck manual items
  container.querySelectorAll('.check-item[data-type="manual"]').forEach(item => {
    const checkbox = item.querySelector('input[type="checkbox"]');
    checkbox.addEventListener('change', () => {
      const idx = parseInt(item.dataset.idx);
      groceryData.manualItems[idx].checked = checkbox.checked;
      saveGroceries();
      item.classList.toggle('checked', checkbox.checked);
    });
  });

  // Clear checked manual items
  const clearBtn = document.getElementById('clearCheckedBtn');
  if (clearBtn) {
    clearBtn.addEventListener('click', () => {
      groceryData.manualItems = (groceryData.manualItems || []).filter(i => !i.checked);
      saveGroceries();
      renderGroceryList();
    });
  }

  // Add manual item
  const addManual = () => {
    const input = document.getElementById('manualItemInput');
    const name = input.value.trim();
    if (!name) return;
    if (!groceryData.manualItems) groceryData.manualItems = [];
    groceryData.manualItems.push({ name, checked: false });
    saveGroceries();
    renderGroceryList();
  };
  document.getElementById('addManualBtn').addEventListener('click', addManual);
  document.getElementById('manualItemInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addManual();
  });
}
