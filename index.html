<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Menu App</title>
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      color: #333; background: #fafafa;
      min-height: 100vh; display: flex; flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== TOP BAR ===== */
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; background: #fff; border-bottom: 1px solid #e5e5e5;
      position: sticky; top: 0; z-index: 100;
    }
    .top-bar h1 { font-size: 18px; font-weight: 700; }
    .top-bar-actions { display: flex; gap: 8px; align-items: center; }
    .lang-toggle {
      background: none; border: 1px solid #ddd; border-radius: 6px;
      padding: 4px 10px; font-size: 13px; font-weight: 600; color: #555; cursor: pointer;
    }
    .lang-toggle:active { background: #f0f0f0; }
    .settings-btn {
      background: none; border: none; font-size: 20px; cursor: pointer; color: #555;
      padding: 4px;
    }

    /* ===== TAB CONTENT ===== */
    .tab-content {
      flex: 1; overflow-y: auto; padding: 16px;
      padding-bottom: 72px; /* space for bottom bar */
      display: none;
    }
    .tab-content.active { display: block; }

    /* ===== BOTTOM TAB BAR ===== */
    .tab-bar {
      display: flex; position: fixed; bottom: 0; left: 0; right: 0;
      background: #fff; border-top: 1px solid #e5e5e5;
      z-index: 100; padding-bottom: env(safe-area-inset-bottom, 0);
    }
    .tab-bar button {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 8px 0; border: none; background: none;
      font-size: 11px; color: #999; cursor: pointer; gap: 2px;
    }
    .tab-bar button .tab-icon { font-size: 22px; }
    .tab-bar button.active { color: #2563eb; }

    /* ===== MODAL OVERLAY ===== */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      z-index: 200; align-items: center; justify-content: center; padding: 16px;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #fff; border-radius: 12px; padding: 24px; width: 100%;
      max-width: 400px; max-height: 90vh; overflow-y: auto;
    }
    .modal h2 { font-size: 18px; margin-bottom: 16px; }
    .modal-actions { display: flex; gap: 8px; margin-top: 16px; }

    /* ===== BUTTONS ===== */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 10px 16px; border-radius: 8px; font-size: 14px;
      font-weight: 600; cursor: pointer; border: none;
    }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:active { background: #1d4ed8; }
    .btn-secondary { background: #f3f4f6; color: #333; }
    .btn-secondary:active { background: #e5e7eb; }
    .btn-danger { background: #fee2e2; color: #dc2626; }
    .btn-danger:active { background: #fecaca; }
    .btn-full { width: 100%; }
    .btn-sm { padding: 6px 12px; font-size: 13px; }

    /* ===== FORM ELEMENTS ===== */
    input[type="text"], input[type="number"], select, textarea {
      width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px;
      font-size: 14px; font-family: inherit; color: #333; background: #fff;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #2563eb; }
    textarea { resize: vertical; min-height: 60px; }

    /* ===== CARDS ===== */
    .card {
      background: #fff; border-radius: 10px; padding: 14px;
      border: 1px solid #e5e5e5; margin-bottom: 10px; cursor: pointer;
    }
    .card:active { background: #f9f9f9; }
    .card-title { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
    .card-meta { font-size: 12px; color: #888; }

    /* ===== CHIPS ===== */
    .chip-row { display: flex; gap: 8px; overflow-x: auto; padding: 8px 0; }
    .chip {
      padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500;
      background: #f3f4f6; color: #555; border: none; cursor: pointer; white-space: nowrap;
    }
    .chip.active { background: #2563eb; color: #fff; }

    /* ===== CHECKLIST ===== */
    .check-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .check-item input[type="checkbox"] {
      width: 20px; height: 20px; accent-color: #2563eb; cursor: pointer;
    }
    .check-item.checked .check-label { text-decoration: line-through; color: #aaa; }
    .check-label { flex: 1; font-size: 14px; }
    .check-amount { font-size: 13px; color: #888; }

    /* ===== FAB ===== */
    .fab {
      position: fixed; bottom: 72px; right: 16px; width: 52px; height: 52px;
      border-radius: 50%; background: #2563eb; color: #fff; border: none;
      font-size: 28px; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      display: flex; align-items: center; justify-content: center; z-index: 50;
    }
    .fab:active { background: #1d4ed8; }

    /* ===== MEAL PLAN ===== */
    .week-row {
      display: flex; gap: 8px; overflow-x: auto; padding: 8px 0;
      scroll-snap-type: x mandatory;
    }
    .day-col {
      min-width: 130px; flex-shrink: 0; scroll-snap-align: start;
      background: #fff; border-radius: 10px; border: 1px solid #e5e5e5; padding: 10px;
    }
    .day-col.today { border-color: #2563eb; }
    .day-header {
      font-size: 13px; font-weight: 700; text-align: center;
      margin-bottom: 8px; color: #555;
    }
    .day-header.today { color: #2563eb; }
    .day-date { font-size: 11px; color: #999; font-weight: 400; }
    .meal-chip {
      font-size: 12px; padding: 6px 8px; background: #f3f4f6; border-radius: 6px;
      margin-bottom: 4px; position: relative;
    }
    .meal-chip .slot-label { font-weight: 600; font-size: 10px; color: #888; text-transform: uppercase; }
    .meal-chip .recipe-name { font-size: 12px; margin-top: 2px; }
    .day-add-btn {
      width: 100%; padding: 6px; border: 1px dashed #ddd; border-radius: 6px;
      background: none; font-size: 18px; color: #ccc; cursor: pointer; margin-top: 4px;
    }
    .day-add-btn:active { background: #f9f9f9; }

    /* ===== RECIPE DETAIL ===== */
    .detail-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .back-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #555; padding: 4px; }
    .servings-control { display: flex; align-items: center; gap: 12px; margin: 12px 0; }
    .servings-control button {
      width: 32px; height: 32px; border-radius: 50%; border: 1px solid #ddd;
      background: #fff; font-size: 18px; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
    }
    .servings-control button:active { background: #f0f0f0; }
    .servings-count { font-size: 16px; font-weight: 600; min-width: 20px; text-align: center; }
    .ingredient-row {
      display: flex; align-items: center; gap: 8px; padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .ingredient-amount {
      min-width: 60px; font-weight: 600; font-size: 14px; color: #2563eb;
      cursor: pointer; padding: 2px 4px; border-radius: 4px;
    }
    .ingredient-amount:hover { background: #eff6ff; }
    .instruction-step {
      display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid #f0f0f0;
    }
    .step-num {
      width: 24px; height: 24px; border-radius: 50%; background: #2563eb; color: #fff;
      font-size: 12px; font-weight: 700; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0;
    }

    /* ===== SETTINGS MODAL ===== */
    .settings-list { list-style: none; }
    .settings-list li {
      padding: 14px 0; border-bottom: 1px solid #f0f0f0;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; font-size: 15px;
    }
    .settings-list li:active { color: #2563eb; }

    /* ===== TOAST ===== */
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: #333; color: #fff; padding: 10px 20px; border-radius: 8px;
      font-size: 14px; z-index: 300; opacity: 0; transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }

    /* ===== UTILITY ===== */
    .section-title { font-size: 14px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin: 16px 0 8px; }
    .empty-state { text-align: center; padding: 40px 16px; color: #999; font-size: 14px; }
    .hidden { display: none !important; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
    .mb-8 { margin-bottom: 8px; }
    .mb-16 { margin-bottom: 16px; }
    .gap-8 { gap: 8px; }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="top-bar">
    <h1>Menu App</h1>
    <div class="top-bar-actions">
      <button class="lang-toggle" id="langToggle">EN</button>
      <button class="settings-btn" id="settingsBtn">&#9881;</button>
    </div>
  </div>

  <!-- TAB: RECIPES -->
  <div class="tab-content active" id="tab-recipes"></div>

  <!-- TAB: MEAL PLAN -->
  <div class="tab-content" id="tab-mealplan"></div>

  <!-- TAB: GROCERY LIST -->
  <div class="tab-content" id="tab-grocery"></div>

  <!-- BOTTOM TAB BAR -->
  <div class="tab-bar">
    <button class="active" data-tab="recipes">
      <span class="tab-icon">&#127858;</span>
      <span data-lang="recipes">Recipes</span>
    </button>
    <button data-tab="mealplan">
      <span class="tab-icon">&#128197;</span>
      <span data-lang="mealPlan">Meal Plan</span>
    </button>
    <button data-tab="grocery">
      <span class="tab-icon">&#128722;</span>
      <span data-lang="groceryList">Grocery List</span>
    </button>
  </div>

  <!-- SETTINGS MODAL -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal">
      <h2 data-lang="settings">Settings</h2>
      <ul class="settings-list">
        <li id="exportBtn"><span data-lang="exportData">Export Data</span> <span>&#8594;</span></li>
        <li id="importBtn"><span data-lang="importData">Import Data</span> <span>&#8594;</span></li>
      </ul>
      <div class="modal-actions">
        <button class="btn btn-secondary btn-full" id="settingsClose" data-lang="cancel">Cancel</button>
      </div>
    </div>
  </div>

  <!-- IMPORT CONFIRM MODAL -->
  <div class="modal-overlay" id="importModal">
    <div class="modal">
      <h2 data-lang="importData">Import Data</h2>
      <p data-lang="mergeOrReplace">Merge with existing data or replace?</p>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="importMergeBtn" data-lang="merge">Merge</button>
        <button class="btn btn-danger" id="importReplaceBtn" data-lang="replace">Replace</button>
        <button class="btn btn-secondary" id="importCancelBtn" data-lang="cancel">Cancel</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- HIDDEN FILE INPUT -->
  <input type="file" id="fileInput" accept=".json" class="hidden">

  <script src="lang.js"></script>
  <script src="recipes-data.js"></script>
  <script>
// ===== STATE =====
const STORAGE_KEYS = {
  recipes: 'menuapp-recipes',
  mealplan: 'menuapp-mealplan',
  groceries: 'menuapp-groceries',
  lang: 'menuapp-lang',
};

let currentLang = localStorage.getItem(STORAGE_KEYS.lang) || 'en';
let customRecipes = JSON.parse(localStorage.getItem(STORAGE_KEYS.recipes) || '[]');
let mealPlan = JSON.parse(localStorage.getItem(STORAGE_KEYS.mealplan) || '{}');
let groceryData = JSON.parse(localStorage.getItem(STORAGE_KEYS.groceries) || '{"autoItems":[],"manualItems":[]}');

function saveRecipes() { localStorage.setItem(STORAGE_KEYS.recipes, JSON.stringify(customRecipes)); }
function saveMealPlan() { localStorage.setItem(STORAGE_KEYS.mealplan, JSON.stringify(mealPlan)); }
function saveGroceries() { localStorage.setItem(STORAGE_KEYS.groceries, JSON.stringify(groceryData)); }
function saveLang() { localStorage.setItem(STORAGE_KEYS.lang, currentLang); }

function getAllRecipes() {
  const overrideIds = customRecipes.filter(r => r.overrides).map(r => r.overrides);
  const base = STARTER_RECIPES.filter(r => !overrideIds.includes(r.id));
  return [...base, ...customRecipes];
}

function getRecipeById(id) {
  return customRecipes.find(r => r.id === id) || STARTER_RECIPES.find(r => r.id === id);
}

// ===== i18n =====
function t(key) {
  return LANG[key] ? (LANG[key][currentLang] || LANG[key].en) : key;
}

function tName(obj) {
  if (!obj) return '';
  if (typeof obj === 'string') return obj;
  return obj[currentLang] || obj.en || '';
}

function updateLangUI() {
  document.querySelectorAll('[data-lang]').forEach(el => {
    const key = el.getAttribute('data-lang');
    if (LANG[key]) el.textContent = t(key);
  });
  document.querySelectorAll('[data-lang-placeholder]').forEach(el => {
    const key = el.getAttribute('data-lang-placeholder');
    if (LANG[key]) el.placeholder = t(key);
  });
  document.getElementById('langToggle').textContent = currentLang.toUpperCase();
}

// ===== TAB NAVIGATION =====
const tabButtons = document.querySelectorAll('.tab-bar button');
const tabContents = document.querySelectorAll('.tab-content');

function switchTab(tabName) {
  tabButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tabName));
  tabContents.forEach(tc => tc.classList.toggle('active', tc.id === 'tab-' + tabName));
  // Hide FAB when not on recipes list
  const fab = document.getElementById('recipeFab');
  if (fab) fab.classList.toggle('hidden', tabName !== 'recipes');
  if (tabName === 'recipes') renderRecipesList();
  if (tabName === 'mealplan') renderMealPlan();
  if (tabName === 'grocery') renderGroceryList();
}

tabButtons.forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.tab)));

// ===== LANGUAGE TOGGLE =====
document.getElementById('langToggle').addEventListener('click', () => {
  currentLang = currentLang === 'en' ? 'es' : 'en';
  saveLang();
  updateLangUI();
  // Re-render active tab
  const activeTab = document.querySelector('.tab-bar button.active').dataset.tab;
  switchTab(activeTab);
});

// ===== SETTINGS MODAL =====
const settingsModal = document.getElementById('settingsModal');
document.getElementById('settingsBtn').addEventListener('click', () => settingsModal.classList.add('active'));
document.getElementById('settingsClose').addEventListener('click', () => settingsModal.classList.remove('active'));
settingsModal.addEventListener('click', (e) => { if (e.target === settingsModal) settingsModal.classList.remove('active'); });

// ===== TOAST =====
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// ===== EXPORT =====
document.getElementById('exportBtn').addEventListener('click', () => {
  const data = { customRecipes, mealPlan, groceryData, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'menu-app-data.json'; a.click();
  URL.revokeObjectURL(url);
  showToast(t('exportSuccess'));
  settingsModal.classList.remove('active');
});

// ===== IMPORT =====
const importModal = document.getElementById('importModal');
const fileInput = document.getElementById('fileInput');
let pendingImportData = null;

document.getElementById('importBtn').addEventListener('click', () => {
  settingsModal.classList.remove('active');
  fileInput.click();
});

fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      pendingImportData = JSON.parse(ev.target.result);
      importModal.classList.add('active');
    } catch { showToast('Invalid JSON file'); }
  };
  reader.readAsText(file);
  fileInput.value = '';
});

function applyImport(mode) {
  if (!pendingImportData) return;
  if (mode === 'replace') {
    customRecipes = pendingImportData.customRecipes || [];
    mealPlan = pendingImportData.mealPlan || {};
    groceryData = pendingImportData.groceryData || { autoItems: [], manualItems: [] };
  } else {
    // Merge: add new custom recipes (by id), merge meal plan days, append manual grocery items
    const existingIds = new Set(customRecipes.map(r => r.id));
    (pendingImportData.customRecipes || []).forEach(r => {
      if (!existingIds.has(r.id)) customRecipes.push(r);
      else {
        const idx = customRecipes.findIndex(e => e.id === r.id);
        customRecipes[idx] = r;
      }
    });
    Object.assign(mealPlan, pendingImportData.mealPlan || {});
    const importManual = pendingImportData.groceryData?.manualItems || [];
    groceryData.manualItems = [...groceryData.manualItems, ...importManual];
  }
  saveRecipes(); saveMealPlan(); saveGroceries();
  pendingImportData = null;
  importModal.classList.remove('active');
  showToast(t('importSuccess'));
  const activeTab = document.querySelector('.tab-bar button.active').dataset.tab;
  switchTab(activeTab);
}

document.getElementById('importMergeBtn').addEventListener('click', () => applyImport('merge'));
document.getElementById('importReplaceBtn').addEventListener('click', () => applyImport('replace'));
document.getElementById('importCancelBtn').addEventListener('click', () => { pendingImportData = null; importModal.classList.remove('active'); });
importModal.addEventListener('click', (e) => { if (e.target === importModal) { pendingImportData = null; importModal.classList.remove('active'); } });

// ===== RENDER STUBS (implemented in next tasks) =====
let currentCategory = 'all';
let currentSearch = '';
let currentView = 'list'; // 'list' or 'detail'
let viewingRecipeId = null;

function renderRecipesList() {
  currentView = 'list';
  viewingRecipeId = null;
  const container = document.getElementById('tab-recipes');
  const recipes = getAllRecipes();
  const filtered = recipes.filter(r => {
    const matchCat = currentCategory === 'all' || r.category === currentCategory;
    const matchSearch = currentSearch === '' ||
      tName(r.name).toLowerCase().includes(currentSearch.toLowerCase());
    return matchCat && matchSearch;
  });

  container.innerHTML = `
    <input type="text" id="recipeSearch" value="${currentSearch}"
      data-lang-placeholder="search" placeholder="${t('search')}"
      style="margin-bottom:8px;">
    <div class="chip-row">
      ${['all','breakfast','lunch','dinner','snack'].map(cat =>
        `<button class="chip ${currentCategory === cat ? 'active' : ''}" data-cat="${cat}">
          ${t(cat)}
        </button>`
      ).join('')}
    </div>
    ${filtered.length === 0 ? '<div class="empty-state">No recipes found</div>' :
      filtered.map(r => `
        <div class="card" data-recipe-id="${r.id}">
          <div class="card-title">${tName(r.name)}</div>
          <div class="card-meta">
            ${t('prepTime')} ${r.prepTime}${t('minutes')} · ${t('cookTime')} ${r.cookTime}${t('minutes')} · ${r.servings} ${t('servings').toLowerCase()}
          </div>
        </div>
      `).join('')}
  `;

  // FAB
  let fab = document.getElementById('recipeFab');
  if (!fab) {
    fab = document.createElement('button');
    fab.id = 'recipeFab';
    fab.className = 'fab';
    fab.textContent = '+';
    document.body.appendChild(fab);
    fab.addEventListener('click', () => openRecipeForm(null));
  }
  fab.classList.remove('hidden');

  // Event: search
  document.getElementById('recipeSearch').addEventListener('input', (e) => {
    currentSearch = e.target.value;
    renderRecipesList();
  });

  // Event: category chips
  container.querySelectorAll('.chip[data-cat]').forEach(chip => {
    chip.addEventListener('click', () => {
      currentCategory = chip.dataset.cat;
      renderRecipesList();
    });
  });

  // Event: card clicks
  container.querySelectorAll('.card[data-recipe-id]').forEach(card => {
    card.addEventListener('click', () => renderRecipeDetail(card.dataset.recipeId));
  });
}

function renderRecipeDetail(recipeId) {
  currentView = 'detail';
  viewingRecipeId = recipeId;
  const recipe = getRecipeById(recipeId);
  if (!recipe) return renderRecipesList();

  const baseRecipe = recipe.overrides
    ? (STARTER_RECIPES.find(r => r.id === recipe.overrides) || recipe)
    : recipe;
  const scaleFactor = recipe.servings / baseRecipe.servings;

  const container = document.getElementById('tab-recipes');
  const fab = document.getElementById('recipeFab');
  if (fab) fab.classList.add('hidden');

  const isOverride = !!recipe.overrides;
  const isCustom = recipe.isCustom && !recipe.overrides;

  container.innerHTML = `
    <div class="detail-header">
      <button class="back-btn" id="backToList">&#8592;</button>
      <div>
        ${isCustom ? `<button class="btn btn-sm btn-secondary" id="editRecipeBtn">${t('editRecipe')}</button>
        <button class="btn btn-sm btn-danger" id="deleteRecipeBtn">${t('deleteRecipe')}</button>` : ''}
        ${isOverride ? `<button class="btn btn-sm btn-secondary" id="resetRecipeBtn">${t('resetToOriginal')}</button>` : ''}
      </div>
    </div>
    <h2>${tName(recipe.name)}</h2>
    <div class="card-meta mb-16">
      ${t('prepTime')} ${recipe.prepTime}${t('minutes')} · ${t('cookTime')} ${recipe.cookTime}${t('minutes')}
    </div>
    <div class="servings-control">
      <span style="font-weight:600">${t('servings')}:</span>
      <button id="servMinus">&#8722;</button>
      <span class="servings-count" id="servCount">${recipe.servings}</span>
      <button id="servPlus">+</button>
    </div>
    <div class="section-title">${t('ingredients')}</div>
    <div id="ingredientsList">
      ${recipe.ingredients.map((ing, i) => {
        const displayAmount = +(ing.amount * scaleFactor).toFixed(1);
        return `<div class="ingredient-row">
          <span class="ingredient-amount" data-idx="${i}" title="Click to edit">${displayAmount} ${ing.unit}</span>
          <span>${tName(ing.name)}</span>
        </div>`;
      }).join('')}
    </div>
    <div class="section-title">${t('instructions')}</div>
    <div>
      ${(recipe.instructions[currentLang] || recipe.instructions.en).map((step, i) => `
        <div class="instruction-step">
          <span class="step-num">${i + 1}</span>
          <span>${step}</span>
        </div>
      `).join('')}
    </div>
  `;

  // Back button
  document.getElementById('backToList').addEventListener('click', renderRecipesList);

  // Servings +/-
  let currentServings = recipe.servings;
  document.getElementById('servMinus').addEventListener('click', () => {
    if (currentServings <= 1) return;
    currentServings--;
    updateServingsDisplay(recipe, baseRecipe, currentServings);
  });
  document.getElementById('servPlus').addEventListener('click', () => {
    currentServings++;
    updateServingsDisplay(recipe, baseRecipe, currentServings);
  });

  // Click ingredient amount to edit
  container.querySelectorAll('.ingredient-amount').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.idx);
      const ing = recipe.ingredients[idx];
      const currentAmount = +(ing.amount * (currentServings / baseRecipe.servings)).toFixed(1);
      const newVal = prompt(`${tName(ing.name)} — ${t('amount')}:`, currentAmount);
      if (newVal === null || isNaN(parseFloat(newVal))) return;
      // Save as override: scale back to base servings
      const baseAmount = parseFloat(newVal) / (currentServings / baseRecipe.servings);
      saveIngredientEdit(recipe, idx, baseAmount);
    });
  });

  // Delete custom recipe
  const deleteBtn = document.getElementById('deleteRecipeBtn');
  if (deleteBtn) {
    deleteBtn.addEventListener('click', () => {
      if (!confirm(t('confirmDelete'))) return;
      customRecipes = customRecipes.filter(r => r.id !== recipe.id);
      saveRecipes();
      renderRecipesList();
    });
  }

  // Edit custom recipe
  const editBtn = document.getElementById('editRecipeBtn');
  if (editBtn) {
    editBtn.addEventListener('click', () => openRecipeForm(recipe));
  }

  // Reset to original
  const resetBtn = document.getElementById('resetRecipeBtn');
  if (resetBtn) {
    resetBtn.addEventListener('click', () => {
      customRecipes = customRecipes.filter(r => r.id !== recipe.id);
      saveRecipes();
      renderRecipeDetail(recipe.overrides);
    });
  }
}

function updateServingsDisplay(recipe, baseRecipe, newServings) {
  document.getElementById('servCount').textContent = newServings;
  const scale = newServings / baseRecipe.servings;
  document.querySelectorAll('.ingredient-amount').forEach(el => {
    const idx = parseInt(el.dataset.idx);
    const ing = recipe.ingredients[idx];
    const displayAmount = +(ing.amount * scale).toFixed(1);
    el.textContent = `${displayAmount} ${ing.unit}`;
  });
}

function saveIngredientEdit(recipe, ingredientIdx, newBaseAmount) {
  let target;
  if (recipe.isCustom) {
    target = recipe;
  } else {
    // Create an override copy
    target = JSON.parse(JSON.stringify(recipe));
    target.isCustom = true;
    target.overrides = recipe.id;
    target.id = recipe.id + '-custom';
    customRecipes.push(target);
  }
  target.ingredients[ingredientIdx].amount = newBaseAmount;
  saveRecipes();
  renderRecipeDetail(target.id);
}

function renderMealPlan() {}
function renderGroceryList() {}

// ===== INIT =====
updateLangUI();
renderRecipesList();
  </script>
